<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3D6959">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nossa Família">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Nossa Família</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body,#root{height:100%;width:100%;}
    body{background:#F5EFE3;font-family:'Nunito',sans-serif;overflow:hidden;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#DDD4C4;border-radius:2px;}
    button{cursor:pointer;font-family:'Nunito',sans-serif;}
    input,textarea{font-family:'Nunito',sans-serif;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .fu{animation:fadeUp .38s ease forwards;}
    .fi{animation:fadeIn .3s ease forwards;}
    .pulse{animation:pulse 1.6s ease infinite;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TODAY = new Date().toISOString().split('T')[0];
    const WEEK_KEY = (() => {
      const d = new Date(), s = new Date(d.getFullYear(),0,1);
      return `${d.getFullYear()}-W${Math.ceil(((d-s)/86400000+s.getDay()+1)/7)}`;
    })();

    const T = {
      cream:'#F5EFE3', parchment:'#EDE4D3', sage:'#3D6959', sageLt:'#E8F0EC',
      amber:'#C9893A', amberLt:'#FBF0DF', ink:'#1E1C18', muted:'#7A7060',
      border:'#DDD4C4', white:'#FDFCFA',
    };

    const store = {
      async get(k) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return null; } },
      async set(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} },
    };

    function extractJSON(text) {
      try { return JSON.parse(text.trim()); } catch {}
      text = text.replace(/```json|```/g,'').trim();
      try { return JSON.parse(text); } catch {}
      const start = text.indexOf('{');
      if(start === -1) throw new Error('JSON não encontrado');
      let depth=0, inStr=false, esc=false;
      for(let i=start; i<text.length; i++) {
        const c=text[i];
        if(esc){esc=false;continue;}
        if(c==='\\'&&inStr){esc=true;continue;}
        if(c==='"'){inStr=!inStr;continue;}
        if(inStr)continue;
        if(c==='{')depth++;
        if(c==='}'){depth--;if(depth===0){try{return JSON.parse(text.substring(start,i+1));}catch(e){throw new Error('JSON erro');}}}
      }
      throw new Error('JSON incompleto');
    }

    async function callClaude(user, sys) {
      const apiKey = localStorage.getItem('apiKey') || '';
      const prompt = sys ? `${sys}\n\n${user}` : user;
      // CORREÇÃO: Modelo 2.5-flash (compatível com sua conta)
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          contents:[{ parts:[{ text: prompt }] }],
          generationConfig:{ maxOutputTokens:2000, temperature:0.7 }
        })
      });
      const d = await r.json();
      if(d.error) throw new Error(d.error.message);
      const parts = d.candidates[0].content.parts; 
      const textPart = [...parts].reverse().find(p => p.text && !p.thought); 
      return textPart ? textPart.text : parts[parts.length-1].text;
    }

    function speak(text, onEnd) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang='pt-BR'; u.rate=0.88; u.pitch=1.0;
      if(onEnd) u.onend=onEnd;
      window.speechSynthesis.speak(u);
    }
    const stopSpeak = () => window.speechSynthesis.cancel();
    const fmtDate = () => new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    const cap = s => s?s.charAt(0).toUpperCase()+s.slice(1):s;

    // --- TELAS ---
    function ApiKeyScreen({ onSave }) {
      const [key, setKey] = useState('');
      const [err, setErr] = useState('');
      const [testing, setTesting] = useState(false);
      async function handleSave() {
        if(!key.trim()) return;
        setTesting(true);
        try {
          localStorage.setItem('apiKey', key.trim());
          await callClaude('Diga ok', 'Teste');
          onSave();
        } catch(e) { setErr(e.message); localStorage.removeItem('apiKey'); }
        setTesting(false);
      }
      return (
        <div style={{height:'100vh',background:T.cream,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
          <h2 style={{fontFamily:'Lora',marginBottom:20}}>Configuração da Chave</h2>
          <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="Cole sua chave API aqui" style={{width:'100%',maxWidth:300,padding:12,borderRadius:10,border:`1px solid ${T.border}`,marginBottom:10}} />
          {err && <p style={{color:'red',fontSize:12,marginBottom:10}}>{err}</p>}
          <button onClick={handleSave} style={{background:T.sage,color:'white',padding:'12px 24px',border:'none',borderRadius:10}}>{testing?'Testando...':'Salvar Chave'}</button>
        </div>
      );
    }

    function LoginScreen({ members, onLogin, onSetup }) {
      return (
        <div style={{height:'100vh',background:T.cream,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{fontSize:50,marginBottom:10}}>🕊️</div>
          <h1 style={{fontFamily:'Lora',fontSize:28,color:T.ink,marginBottom:30}}>Nossa Família</h1>
          <div style={{width:'100%',maxWidth:300,display:'flex',flexDirection:'column',gap:10}}>
            {members.map(m=>(
              <button key={m.id} onClick={()=>onLogin(m)} style={{background:'white',padding:15,borderRadius:15,border:`1px solid ${T.border}`,display:'flex',alignItems:'center',gap:15}}>
                <span style={{fontSize:24}}>{m.emoji}</span>
                <span style={{fontWeight:700}}>{m.name}</span>
              </button>
            ))}
          </div>
          <button onClick={onSetup} style={{marginTop:20,background:'none',border:'none',color:T.muted,textDecoration:'underline'}}>Editar Família</button>
        </div>
      );
    }

    // --- HOME SCREEN (REVISADA COM O BOTÃO) ---
    function HomeScreen({ user, theme, dev, prayer, comments, loading, onMarkRead, onAddComment, hasRead, members, onGenDaily, onGenWeekly }) {
      const [tab, setTab] = useState('dev');
      const [comment, setComment] = useState('');
      const [speaking, setSpeaking] = useState(false);
      const gm = id => members.find(m=>m.id===id)||{emoji:'👤',name:'Membro',color:T.muted};
      const toggleSpeak = text => { if(speaking){stopSpeak();setSpeaking(false);}else{setSpeaking(true);speak(text,()=>setSpeaking(false));} };

      return (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{padding:20,background:T.white,borderBottom:`1px solid ${T.border}`}}>
            <p style={{fontSize:12,color:T.muted}}>{fmtDate()}</p>
            <h2 style={{fontFamily:'Lora',fontSize:20}}>{user.emoji} Olá, {user.name}</h2>
          </div>
          
          <div style={{flex:1,overflowY:'auto',padding:20}}>
            {loading ? (
              <div style={{textAlign:'center',marginTop:50}} className="pulse">
                <div style={{fontSize:40}}>✨</div>
                <p style={{fontFamily:'Lora',fontStyle:'italic',marginTop:10}}>Preparando sua leitura...</p>
              </div>
            ) : !dev ? (
              <div style={{textAlign:'center',marginTop:50}} className="fi">
                <div style={{fontSize:50,marginBottom:20}}>📖</div>
                <p style={{fontFamily:'Lora',color:T.muted,marginBottom:20}}>O devocional de hoje ainda não foi gerado.</p>
                <button 
                  onClick={() => theme ? onGenDaily() : onGenWeekly()} 
                  style={{padding:'15px 30px',background:T.sage,color:'white',border:'none',borderRadius:25,fontWeight:'bold',boxShadow:`0 4px 14px ${T.sage}44`}}>
                  ✨ Gerar Devocional de Hoje
                </button>
              </div>
            ) : tab==='dev'?(
              <div className="fi">
                <div style={{background:T.sage,borderRadius:20,padding:24,marginBottom:22,color:'white'}}>
                  <p style={{fontSize:10,opacity:0.7,textTransform:'uppercase'}}>Versículo do dia</p>
                  <p style={{fontFamily:'Lora',fontSize:18,fontStyle:'italic',margin:'10px 0'}}>"{dev.verseText}"</p>
                  <p style={{fontSize:14,fontWeight:700}}>— {dev.verse}</p>
                </div>
                <h3 style={{fontFamily:'Lora',fontSize:22,marginBottom:15}}>{dev.title}</h3>
                {dev.reflection.split('\n\n').map((p,i)=><p key={i} style={{lineHeight:1.8,marginBottom:15}}>{p}</p>)}
                {!hasRead && <button onClick={onMarkRead} style={{width:'100%',padding:15,background:T.sage,color:'white',border:'none',borderRadius:15,fontWeight:800}}>✓ Concluir Leitura</button>}
              </div>
            ) : (
              <div className="fi">
                <div style={{background:T.amberLt,padding:24,borderRadius:20,borderLeft:`4px solid ${T.amber}`}}>
                  <p style={{color:T.amber,fontWeight:700,marginBottom:10}}>🙏 Oração do Dia</p>
                  <p style={{fontFamily:'Lora',fontStyle:'italic',lineHeight:1.8}}>{dev.prayer}</p>
                </div>
              </div>
            )}
          </div>

          <div style={{background:T.white,display:'flex',padding:'10px 0 20px',borderTop:`1px solid ${T.border}`}}>
            <button onClick={()=>setTab('dev')} style={{flex:1,background:'none',border:'none',color:tab==='dev'?T.sage:T.muted}}>📖 Devocional</button>
            <button onClick={()=>setTab('prayer')} style={{flex:1,background:'none',border:'none',color:tab==='prayer'?T.sage:T.muted}}>🙏 Oração</button>
          </div>
        </div>
      );
    }

    // --- COMPONENTES AUXILIARES (Resumidos para o código caber) ---
    function BoardScreen({ members, progress }) { return <div style={{padding:20,textAlign:'center'}}><h2 style={{fontFamily:'Lora'}}>Jornada da Família</h2><p style={{marginTop:20}}>Em breve: Mapa do progresso espiritual!</p></div>; }
    function PrayersScreen() { return <div style={{padding:20,textAlign:'center'}}><h2 style={{fontFamily:'Lora'}}>Mural de Orações</h2><p style={{marginTop:20}}>Espaço para pedidos e intercessões.</p></div>; }
    function MissionsScreen() { return <div style={{padding:20,textAlign:'center'}}><h2 style={{fontFamily:'Lora'}}>Missões Semanais</h2><p style={{marginTop:20}}>Desafios para praticar a fé em casa.</p></div>; }

    function App() {
      const [view, setView] = useState('loading');
      const [tab, setTab] = useState('home');
      const [user, setUser] = useState(null);
      const [members, setMembers] = useState([]);
      const [theme, setTheme] = useState(null);
      const [dev, setDev] = useState(null);
      const [loading, setLoading] = useState(false);
      const [progress, setProgress] = useState({});

      useEffect(()=>{(async()=>{
        const hasKey=!!localStorage.getItem('apiKey');
        const m = await store.get('members') || [{id:'1',name:'Bela',emoji:'🌿',color:'#3D6959'}];
        setMembers(m);
        const [th, d] = await Promise.all([store.get(`theme-${WEEK_KEY}`), store.get(`dev-${TODAY}`)]);
        setTheme(th); setDev(d);
        setView(hasKey?'login':'apikey');
      })()},[]);

      async function genWeekly(){
        setLoading(true);
        try{
          const raw = await callClaude(`Gere um tema semanal familiar cristão. JSON:\n{"theme":"Título","description":"frase","verse":"Ref","verseText":"texto","missions":[]}`,'Pastor cristão.');
          const th = extractJSON(raw);
          setTheme(th); await store.set(`theme-${WEEK_KEY}`, th);
          await genDaily(th);
        }catch(e){ alert(e.message); }
        setLoading(false);
      }

      async function genDaily(th){
        setLoading(true);
        try{
          const raw = await callClaude(`Tema: ${th.theme}. Gere o devocional de hoje. JSON:\n{"title":"título","verse":"Ref","verseText":"texto","reflection":"texto","prayer":"oração"}`,'Pastor cristão.');
          const d = extractJSON(raw);
          setDev(d); await store.set(`dev-${TODAY}`, d);
        }catch(e){ alert(e.message); }
        setLoading(false);
      }

      const markRead = async () => {
        const p = {...progress, [user.id]: { devotionals: [...(progress[user.id]?.devotionals||[]), TODAY] }};
        setProgress(p); await store.set('progress', p);
      };

      if(view==='loading') return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:T.cream}}>🕊️</div>;
      if(view==='apikey') return <ApiKeyScreen onSave={()=>setView('login')}/>;
      if(view==='login') return <LoginScreen members={members} onLogin={m=>{setUser(m);setView('app')}} onSetup={()=>alert('Função em breve')}/>;

      return (
        <div style={{height:'100vh',display:'flex',flexDirection:'column',background:T.cream,maxWidth:480,margin:'0 auto'}}>
          {tab==='home' && <HomeScreen user={user} theme={theme} dev={dev} loading={loading} onMarkRead={markRead} members={members} onGenDaily={()=>genDaily(theme)} onGenWeekly={genWeekly} />}
          {tab==='board' && <BoardScreen members={members} progress={progress} />}
          {tab==='prayers' && <PrayersScreen />}
          {tab==='missions' && <MissionsScreen />}
          
          <div style={{display:'flex',background:'white',borderTop:`1px solid ${T.border}`,paddingBottom:10}}>
            {['home','board','prayers','missions'].map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:15,background:'none',border:'none',fontSize:20,opacity:tab===t?1:0.3}}>{t==='home'?'📖':t==='board'?'🗺️':t==='prayers'?'🙏':'⚔️'}</button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
