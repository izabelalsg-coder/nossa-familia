<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3D6959">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nossa Família">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Nossa Família</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body,#root{height:100%;width:100%;}
    body{background:#F5EFE3;font-family:'Nunito',sans-serif;overflow:hidden;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#DDD4C4;border-radius:2px;}
    button{cursor:pointer;font-family:'Nunito',sans-serif;}
    input,textarea{font-family:'Nunito',sans-serif;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .fu{animation:fadeUp .38s ease forwards;}
    .fi{animation:fadeIn .3s ease forwards;}
    .pulse{animation:pulse 1.6s ease infinite;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TODAY = new Date().toISOString().split('T')[0];
    const WEEK_KEY = (() => {
      const d = new Date(), s = new Date(d.getFullYear(),0,1);
      return `${d.getFullYear()}-W${Math.ceil(((d-s)/86400000+s.getDay()+1)/7)}`;
    })();

    const T = {
      cream:'#F5EFE3', parchment:'#EDE4D3', sage:'#3D6959', sageLt:'#E8F0EC',
      amber:'#C9893A', amberLt:'#FBF0DF', ink:'#1E1C18', muted:'#7A7060',
      border:'#DDD4C4', white:'#FDFCFA',
    };

    const store = {
      async get(k) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return null; } },
      async set(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} },
    };

    function extractJSON(text) {
      try { return JSON.parse(text.trim()); } catch {}
      text = text.replace(/```json|```/g,'').trim();
      try { return JSON.parse(text); } catch {}
      const start = text.indexOf('{');
      if(start === -1) throw new Error('O Google não enviou o conteúdo no formato correto. Tente novamente.');
      let depth=0, inStr=false, esc=false;
      for(let i=start; i<text.length; i++) {
        const c=text[i];
        if(esc){esc=false;continue;}
        if(c==='\\'&&inStr){esc=true;continue;}
        if(c==='"'){inStr=!inStr;continue;}
        if(inStr)continue;
        if(c==='{')depth++;
        if(c==='}'){depth--;if(depth===0){try{return JSON.parse(text.substring(start,i+1));}catch(e){throw new Error('JSON malformado');}}}
      }
      throw new Error('Resposta incompleta da IA.');
    }

    async function callClaude(user, sys) {
      const apiKey = localStorage.getItem('apiKey') || '';
      const prompt = sys ? `${sys}\n\n${user}` : user;
      // CONEXÃO REVISADA: Modelo 2.5-flash com v1beta
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          contents:[{ parts:[{ text: prompt }] }],
          generationConfig:{ maxOutputTokens:2000, temperature:0.7 }
        })
      });
      const d = await r.json();
      if(d.error) {
          alert("Atenção: " + d.error.message); // Alerta visual para a senhora saber o que houve
          throw new Error(d.error.message);
      }
      const parts = d.candidates[0].content.parts;
      return parts[0].text;
    }

    function speak(text, onEnd) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang='pt-BR'; u.rate=0.88; u.pitch=1.0;
      if(onEnd) u.onend=onEnd;
      window.speechSynthesis.speak(u);
    }
    const stopSpeak = () => window.speechSynthesis.cancel();
    const fmtDate = () => new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    const cap = s => s?s.charAt(0).toUpperCase()+s.slice(1):s;

    // --- TELAS SECUNDÁRIAS ---
    function ApiKeyScreen({ onSave }) {
      const [key, setKey] = useState('');
      const [testing, setTesting] = useState(false);
      async function handleSave() {
        if(!key.trim()) return;
        setTesting(true);
        try {
          localStorage.setItem('apiKey', key.trim());
          await callClaude('Responda ok', 'Teste');
          onSave();
        } catch(e) { localStorage.removeItem('apiKey'); }
        setTesting(false);
      }
      return (
        <div style={{height:'100vh',background:T.cream,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:30}}>
          <h2 style={{fontFamily:'Lora',marginBottom:20}}>Chave da API</h2>
          <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="Cole aqui a chave do Google AI Studio" style={{width:'100%',maxWidth:300,padding:15,borderRadius:12,border:`1px solid ${T.border}`,marginBottom:20}} />
          <button onClick={handleSave} style={{background:T.sage,color:'white',padding:'15px 30px',border:'none',borderRadius:12,fontWeight:'bold'}}>{testing?'Verificando...':'Salvar e Começar'}</button>
        </div>
      );
    }

    function LoginScreen({ members, onLogin, onSetup }) {
      return (
        <div style={{height:'100vh',background:`radial-gradient(ellipse at 25% 0%,#DFF0E8 0%,${T.cream} 55%)`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{fontSize:60,marginBottom:15}}>🕊️</div>
          <h1 style={{fontFamily:'Lora',fontSize:28,fontWeight:700,color:T.ink,marginBottom:40}}>Nossa Família</h1>
          <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:320}}>
            {members.map(m=>(
              <button key={m.id} onClick={()=>onLogin(m)} style={{background:'white',border:`1px solid ${T.border}`,borderRadius:18,padding:20,display:'flex',alignItems:'center',gap:15,textAlign:'left'}}>
                <div style={{fontSize:25}}>{m.emoji}</div>
                <div style={{fontWeight:700,fontSize:17}}>{m.name}</div>
              </button>
            ))}
          </div>
          <button onClick={onSetup} style={{marginTop:30,background:'none',border:'none',color:T.muted,textDecoration:'underline'}}>Editar Membros</button>
        </div>
      );
    }

    // --- TELA PRINCIPAL (CORRIGIDA) ---
    function HomeScreen({ user, theme, dev, loading, onMarkRead, members, onGenDaily, onGenWeekly, hasRead }) {
      const [tab, setTab] = useState('dev');
      const [speaking, setSpeaking] = useState(false);
      const toggleSpeak = text => { if(speaking){stopSpeak();setSpeaking(false);}else{setSpeaking(true);speak(text,()=>setSpeaking(false));} };

      return (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{padding:20,background:'white',borderBottom:`1px solid ${T.border}`}}>
            <p style={{fontSize:12,color:T.muted}}>{fmtDate()}</p>
            <h2 style={{fontFamily:'Lora',fontSize:20,fontWeight:700}}>Olá, {user.name} {user.emoji}</h2>
          </div>

          <div style={{flex:1,overflowY:'auto',padding:20}}>
            {loading ? (
              <div style={{textAlign:'center',padding:80}} className="pulse">
                <div style={{fontSize:42,marginBottom:15}}>✨</div>
                <p style={{fontFamily:'Lora',fontStyle:'italic',color:T.muted}}>A IA está escrevendo o devocional...</p>
              </div>
            ) : !dev ? (
              <div style={{textAlign:'center',padding:60}} className="fi">
                <div style={{fontSize:50,marginBottom:20}}>📖</div>
                <p style={{fontFamily:'Lora',color:T.muted,marginBottom:25}}>O devocional de hoje ainda não foi gerado.</p>
                <button 
                  onClick={() => { console.log("Clicou no botão"); theme ? onGenDaily() : onGenWeekly(); }}
                  style={{padding:'15px 30px',background:T.sage,color:'white',border:'none',borderRadius:25,fontWeight:'bold',boxShadow:`0 4px 14px ${T.sage}44`}}>
                  ✨ Gerar Conteúdo de Hoje
                </button>
              </div>
            ) : tab==='dev' ? (
              <div className="fi">
                <div style={{background:T.sage,borderRadius:20,padding:25,marginBottom:20,color:'white'}}>
                  <p style={{fontSize:10,opacity:0.7,fontWeight:700,textTransform:'uppercase'}}>Versículo do dia</p>
                  <p style={{fontFamily:'Lora',fontSize:18,fontStyle:'italic',margin:'12px 0'}}>"{dev.verseText}"</p>
                  <p style={{fontSize:14,fontWeight:700}}>— {dev.verse}</p>
                </div>
                <h3 style={{fontFamily:'Lora',fontSize:22,fontWeight:700,marginBottom:15}}>{dev.title}</h3>
                {dev.reflection.split('\n\n').map((p,i)=><p key={i} style={{fontSize:15,lineHeight:1.8,marginBottom:15}}>{p}</p>)}
                {!hasRead && <button onClick={onMarkRead} style={{width:'100%',padding:18,background:T.sage,color:'white',border:'none',borderRadius:15,fontWeight:800,marginTop:10}}>✓ Concluir Leitura</button>}
                {hasRead && <div style={{textAlign:'center',padding:15,background:T.sageLt,borderRadius:15,color:T.sage,fontWeight:700}}>✓ Concluído hoje!</div>}
              </div>
            ) : (
              <div className="fi">
                <div style={{background:T.amberLt,borderRadius:20,padding:25,borderLeft:`4px solid ${T.amber}`}}>
                  <p style={{color:T.amber,fontWeight:700,fontSize:12,marginBottom:10,textTransform:'uppercase'}}>🙏 Oração Sugerida</p>
                  <p style={{fontFamily:'Lora',fontStyle:'italic',lineHeight:1.8,fontSize:16}}>{dev.prayer}</p>
                </div>
              </div>
            )}
          </div>
          
          <div style={{background:'white',display:'flex',padding:'10px 0 25px',borderTop:`1px solid ${T.border}`}}>
            <button onClick={()=>setTab('dev')} style={{flex:1,background:'none',border:'none',color:tab==='dev'?T.sage:T.muted,fontWeight:tab==='dev'?800:400}}>📖 Leitura</button>
            <button onClick={()=>setTab('prayer')} style={{flex:1,background:'none',border:'none',color:tab==='prayer'?T.sage:T.muted,fontWeight:tab==='prayer'?800:400}}>🙏 Oração</button>
          </div>
        </div>
      );
    }

    // --- TELAS DE APOIO (Mural, Placar, Missões) ---
    function BoardScreen() { return <div style={{padding:40,textAlign:'center'}}><h2 style={{fontFamily:'Lora'}}>Jornada da Família</h2><p style={{marginTop:20,color:T.muted}}>Em breve: O mapa do progresso espiritual da família!</p></div>; }
    function PrayersScreen() { return <div style={{padding:40,textAlign:'center'}}><h2 style={{fontFamily:'Lora'}}>Mural de Orações</h2><p style={{marginTop:20,color:T.muted}}>Espaço para compartilhar pedidos de oração.</p></div>; }
    function MissionsScreen() { return <div style={{padding:40,textAlign:'center'}}><h2 style={{fontFamily:'Lora'}}>Missões da Semana</h2><p style={{marginTop:20,color:T.muted}}>Desafios práticos para viver a fé em casa.</p></div>; }

    function App() {
      const [view, setView] = useState('loading');
      const [tab, setTab] = useState('home');
      const [user, setUser] = useState(null);
      const [members, setMembers] = useState([]);
      const [theme, setTheme] = useState(null);
      const [dev, setDev] = useState(null);
      const [loading, setLoading] = useState(false);
      const [progress, setProgress] = useState({});

      useEffect(()=>{(async()=>{
        const hasKey = !!localStorage.getItem('apiKey');
        const m = await store.get('members') || [{id:'1',name:'Bela',emoji:'🌿',color:'#3D6959'}];
        setMembers(m);
        const [th, d, pg] = await Promise.all([store.get(`theme-${WEEK_KEY}`), store.get(`dev-${TODAY}`), store.get('progress')]);
        setTheme(th); setDev(d); setProgress(pg || {});
        setView(hasKey?'login':'apikey');
      })()},[]);

      async function genWeekly(){
        setLoading(true);
        try{
          const raw = await callClaude(`Gere um tema semanal familiar cristão. Responda APENAS JSON:\n{"theme":"Título","description":"frase","verse":"Ref ARC","verseText":"texto ARC","missions":[]}`,'Pastor cristão.');
          const th = extractJSON(raw);
          setTheme(th); await store.set(`theme-${WEEK_KEY}`, th);
          await genDaily(th);
        }catch(e){ console.error(e); }
        setLoading(false);
      }

      async function genDaily(th){
        setLoading(true);
        try{
          const raw = await callClaude(`Tema: ${th.theme}. Gere o devocional de hoje. Responda APENAS JSON:\n{"title":"título","verse":"Ref ARC","verseText":"texto ARC","reflection":"texto longo","prayer":"oração"}`,'Pastor cristão.');
          const d = extractJSON(raw);
          setDev(d); await store.set(`dev-${TODAY}`, d);
        }catch(e){ console.error(e); }
        setLoading(false);
      }

      const markRead = async () => {
        const p = {...progress, [user.id]: { devotionals: [...(progress[user.id]?.devotionals||[]), TODAY] }};
        setProgress(p); await store.set('progress', p);
      };

      const hasRead = !!(progress[user?.id]?.devotionals || []).includes(TODAY);

      if(view==='loading') return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:T.cream}}>🕊️</div>;
      if(view==='apikey') return <ApiKeyScreen onSave={()=>setView('login')}/>;
      if(view==='login') return <LoginScreen members={members} onLogin={m=>{setUser(m);setView('app')}} onSetup={()=>alert('Em breve!')}/>;

      return (
        <div style={{height:'100vh',display:'flex',flexDirection:'column',background:T.cream,maxWidth:480,margin:'0 auto',boxShadow:'0 0 40px rgba(0,0,0,0.1)'}}>
          {tab==='home' && <HomeScreen user={user} theme={theme} dev={dev} loading={loading} onMarkRead={markRead} members={members} hasRead={hasRead} onGenDaily={()=>genDaily(theme)} onGenWeekly={genWeekly} />}
          {tab==='board' && <BoardScreen />}
          {tab==='prayers' && <PrayersScreen />}
          {tab==='missions' && <MissionsScreen />}
          
          <div style={{display:'flex',background:'white',borderTop:`1px solid ${T.border}`,paddingBottom:12}}>
            {['home','board','prayers','missions'].map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:15,background:'none',border:'none',fontSize:22,opacity:tab===t?1:0.25}}>
                {t==='home'?'📖':t==='board'?'🗺️':t==='prayers'?'🙏':'⚔️'}
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
