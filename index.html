<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3D6959">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nossa Família">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Nossa Família</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body,#root{height:100%;width:100%;}
    body{background:#F5EFE3;font-family:'Nunito',sans-serif;overflow:hidden;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#DDD4C4;border-radius:2px;}
    button{cursor:pointer;font-family:'Nunito',sans-serif;}
    input,textarea{font-family:'Nunito',sans-serif;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .fu{animation:fadeUp .38s ease forwards;}
    .fi{animation:fadeIn .3s ease forwards;}
    .pulse{animation:pulse 1.6s ease infinite;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── CONSTANTS ─────────────────────────────────────────────────────────
    const TODAY = new Date().toISOString().split('T')[0];
    const WEEK_KEY = (() => {
      const d = new Date(), s = new Date(d.getFullYear(),0,1);
      return `${d.getFullYear()}-W${Math.ceil(((d-s)/86400000+s.getDay()+1)/7)}`;
    })();

    // ── THEME ─────────────────────────────────────────────────────────────
    const T = {
      cream:'#F5EFE3', parchment:'#EDE4D3', sage:'#3D6959', sageLt:'#E8F0EC',
      amber:'#C9893A', amberLt:'#FBF0DF', ink:'#1E1C18', muted:'#7A7060',
      border:'#DDD4C4', white:'#FDFCFA',
    };

    // ── STORAGE (localStorage) ─────────────────────────────────────────────
    const store = {
      async get(k) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return null; } },
      async set(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} },
    };

    // ── JSON EXTRACTOR ────────────────────────────────────────────────────
    function extractJSON(text) {
      // Try direct parse first
      try { return JSON.parse(text.trim()); } catch {}
      // Remove markdown code blocks
      text = text.replace(/```json|```/g,'').trim();
      try { return JSON.parse(text); } catch {}
      // Find first { and match closing }
      const start = text.indexOf('{');
      if(start === -1) throw new Error('Nenhum JSON encontrado na resposta');
      let depth=0, inStr=false, esc=false;
      for(let i=start; i<text.length; i++) {
        const c=text[i];
        if(esc){esc=false;continue;}
        if(c==='\\'&&inStr){esc=true;continue;}
        if(c==='"'){inStr=!inStr;continue;}
        if(inStr)continue;
        if(c==='{')depth++;
        if(c==='}'){depth--;if(depth===0){try{return JSON.parse(text.substring(start,i+1));}catch(e){throw new Error('JSON malformado: '+e.message);}}}
      }
      throw new Error('JSON incompleto na resposta');
    }

    // ── API (Google Gemini — gratuito) ────────────────────────────────────
    async function callClaude(user, sys) {
      const apiKey = localStorage.getItem('apiKey') || '';
      const prompt = sys ? `${sys}\n\n${user}` : user;
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          contents:[{ parts:[{ text: prompt }] }],
          generationConfig:{ maxOutputTokens:2000, temperature:0.7 }
        })
      });
      const d = await r.json();
      if(d.error) throw new Error(d.error.message);
      const parts = d.candidates[0].content.parts; const textPart = [...parts].reverse().find(p => p.text && !p.thought); return textPart ? textPart.text : parts[parts.length-1].text;
    }

    // ── TTS ───────────────────────────────────────────────────────────────
    function speak(text, onEnd) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang='pt-BR'; u.rate=0.88; u.pitch=1.0;
      if(onEnd) u.onend=onEnd;
      window.speechSynthesis.speak(u);
    }
    const stopSpeak = () => window.speechSynthesis.cancel();
    const fmtDate = () => new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    const cap = s => s?s.charAt(0).toUpperCase()+s.slice(1):s;

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // API KEY SETUP SCREEN
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function ApiKeyScreen({ onSave }) {
      const [key, setKey] = useState('');
      const [err, setErr] = useState('');
      const [testing, setTesting] = useState(false);
      const [showKey, setShowKey] = useState(false);

      async function handleSave() {
        if(!key.trim()) { setErr('Cole sua chave do Google AI Studio aqui.'); return; }
        setTesting(true); setErr('');
        try {
          const k = key.trim();
          localStorage.setItem('apiKey', k);
          const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({contents:[{parts:[{text:'Responda: ok'}]}]})
          });
          const d = await r.json();
          if(d.error) {
            localStorage.removeItem('apiKey');
            setErr(`❌ Erro ${d.error.code}: ${d.error.message}`);
          } else {
            onSave();
          }
        } catch(e) {
          localStorage.removeItem('apiKey');
          setErr(`❌ Erro de rede: ${e.message}`);
        }
        setTesting(false);
      }

      return (
        <div style={{minHeight:'100vh',background:`radial-gradient(ellipse at 25% 0%,#DFF0E8,${T.cream} 60%)`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px'}}>
          <div className="fu" style={{textAlign:'center',marginBottom:'32px'}}>
            <div style={{fontSize:'52px',marginBottom:'16px'}}>🔑</div>
            <h1 style={{fontFamily:"'Lora',serif",fontSize:'24px',fontWeight:'700',color:T.ink}}>Configuração Inicial</h1>
            <p style={{color:T.muted,marginTop:'10px',fontSize:'14px',lineHeight:'1.6'}}>
              Para gerar os devocionais com IA,<br/>você precisa de uma chave do Google — gratuita!
            </p>
          </div>
          <div style={{width:'100%',maxWidth:'340px'}}>
            <div style={{background:T.amberLt,border:`1px solid ${T.amber}44`,borderRadius:'14px',padding:'16px',marginBottom:'20px'}}>
              <p style={{fontWeight:'700',color:T.amber,fontSize:'13px',marginBottom:'8px'}}>📋 Como obter sua chave (grátis):</p>
              <ol style={{color:T.muted,fontSize:'13px',lineHeight:'1.9',paddingLeft:'18px'}}>
                <li>Acesse <strong>aistudio.google.com</strong></li>
                <li>Entre com sua conta Google</li>
                <li>Clique em <strong>Get API Key</strong></li>
                <li>Clique em <strong>Create API key</strong></li>
                <li>Copie a chave e cole abaixo</li>
              </ol>
              <p style={{fontSize:'11px',color:T.muted,marginTop:'10px',opacity:.8}}>
                ✅ 100% gratuito. Sem cartão de crédito.
              </p>
            </div>
            <div style={{position:'relative',marginBottom:'10px'}}>
              <input
                value={key} onChange={e=>setKey(e.target.value)}
                placeholder="AIza..."
                type={showKey?'text':'password'}
                style={{width:'100%',padding:'14px 48px 14px 16px',border:`1.5px solid ${err?'#E07070':T.border}`,borderRadius:'12px',fontSize:'14px',outline:'none',background:T.white,color:T.ink}}
              />
              <button onClick={()=>setShowKey(!showKey)} style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',fontSize:'18px',cursor:'pointer',color:T.muted}}>
                {showKey?'🙈':'👁️'}
              </button>
            </div>
            {key && <p style={{fontSize:'11px',color:T.muted,marginBottom:'10px'}}>Início da chave: <strong>{key.substring(0,8)}...</strong> ({key.length} caracteres)</p>}
            {err && <div style={{background:'#FDE8E8',border:'1px solid #F5C0C0',borderRadius:'10px',padding:'12px',marginBottom:'10px'}}>
              <p style={{color:'#C0504D',fontSize:'13px',lineHeight:'1.5'}}>{err}</p>
            </div>}
            <button onClick={handleSave} disabled={testing} style={{width:'100%',padding:'15px',background:testing?T.muted:T.sage,color:'white',border:'none',borderRadius:'14px',fontSize:'15px',fontWeight:'800',boxShadow:`0 5px 18px ${T.sage}44`,transition:'all .2s'}}>
              {testing ? '⏳ Testando...' : 'Salvar e continuar →'}
            </button>
          </div>
        </div>
      );
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // LOGIN SCREEN
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function LoginScreen({ members, onLogin, onSetup }) {
      return (
        <div style={{minHeight:'100vh',background:`radial-gradient(ellipse at 25% 0%,#DFF0E8 0%,${T.cream} 55%)`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px'}}>
          <div className="fu" style={{textAlign:'center',marginBottom:'44px'}}>
            <div style={{fontSize:'58px',marginBottom:'16px',filter:'drop-shadow(0 6px 16px rgba(61,105,89,.22))'}}>🕊️</div>
            <h1 style={{fontFamily:"'Lora',serif",fontSize:'28px',fontWeight:'700',color:T.ink,lineHeight:1.25}}>Nossa Família</h1>
            <p style={{color:T.muted,marginTop:'8px',fontSize:'15px'}}>Quem está orando hoje?</p>
            <p style={{color:T.muted,fontSize:'12px',marginTop:'5px',opacity:.7}}>{cap(fmtDate())}</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'10px',width:'100%',maxWidth:'320px'}}>
            {members.map((m,i) => (
              <button key={m.id} className="fu" onClick={()=>onLogin(m)} style={{
                background:T.white,border:`1.5px solid ${T.border}`,borderRadius:'18px',padding:'17px 22px',
                display:'flex',alignItems:'center',gap:'16px',textAlign:'left',
                animationDelay:`${i*.08}s`,opacity:0,boxShadow:'0 2px 16px rgba(0,0,0,.06)',transition:'all .2s ease'
              }}
              onMouseOver={e=>{e.currentTarget.style.borderColor=T.sage;e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow=`0 8px 28px ${T.sage}28`;}}
              onMouseOut={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 2px 16px rgba(0,0,0,.06)';}}>
                <div style={{width:'46px',height:'46px',borderRadius:'50%',background:`${m.color}1A`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px',border:`2px solid ${m.color}44`,flexShrink:0}}>{m.emoji}</div>
                <div>
                  <p style={{fontFamily:"'Lora',serif",fontSize:'17px',fontWeight:'600',color:T.ink}}>{m.name}</p>
                  <p style={{fontSize:'12px',color:T.muted,marginTop:'2px'}}>Entrar como {m.name}</p>
                </div>
                <span style={{marginLeft:'auto',color:T.border,fontSize:'22px'}}>›</span>
              </button>
            ))}
          </div>
          <button onClick={onSetup} style={{marginTop:'28px',background:'none',border:'none',color:T.muted,fontSize:'13px',textDecoration:'underline',opacity:.75}}>
            ✦ Editar membros da família
          </button>
        </div>
      );
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // SETUP SCREEN
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function SetupScreen({ members, onSave, onBack }) {
      const [list, setList] = useState(members.map(m=>({...m})));
      const emojis = ['🌿','🌸','✨','🕊️','🌻','🌙','⭐','🦋','🌺','🍀','🦚','🌾'];
      const colors = ['#3D6959','#C4956A','#7B8EC8','#C87B8E','#8E7BC4','#7BC4B5'];
      const upd = (id,f,v) => setList(list.map(m=>m.id===id?{...m,[f]:v}:m));
      return (
        <div style={{height:'100vh',background:T.cream,display:'flex',flexDirection:'column'}}>
          <div style={{padding:'20px',background:T.white,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',gap:'12px',flexShrink:0}}>
            <button onClick={onBack} style={{background:'none',border:'none',fontSize:'24px',lineHeight:1,color:T.muted}}>‹</button>
            <h2 style={{fontFamily:"'Lora',serif",fontSize:'18px',fontWeight:'700',color:T.ink}}>Membros da Família</h2>
          </div>
          <div style={{flex:1,padding:'20px',overflowY:'auto'}}>
            {list.map(m => (
              <div key={m.id} style={{background:T.white,border:`1px solid ${T.border}`,borderRadius:'16px',padding:'16px',marginBottom:'12px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}}>
                  <span style={{fontSize:'28px'}}>{m.emoji}</span>
                  <input value={m.name} onChange={e=>upd(m.id,'name',e.target.value)} style={{flex:1,padding:'10px 14px',border:`1px solid ${T.border}`,borderRadius:'10px',fontSize:'15px',outline:'none',color:T.ink,background:T.cream}}/>
                  {list.length>1&&<button onClick={()=>setList(list.filter(x=>x.id!==m.id))} style={{background:'none',border:'none',fontSize:'18px',opacity:.5}}>🗑</button>}
                </div>
                <p style={{fontSize:'11px',color:T.muted,fontWeight:'700',letterSpacing:'.8px',marginBottom:'8px'}}>EMOJI</p>
                <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'12px'}}>
                  {emojis.map(e=><button key={e} onClick={()=>upd(m.id,'emoji',e)} style={{width:'34px',height:'34px',borderRadius:'8px',fontSize:'18px',border:`2px solid ${m.emoji===e?T.sage:T.border}`,background:m.emoji===e?T.sageLt:'transparent'}}>{e}</button>)}
                </div>
                <p style={{fontSize:'11px',color:T.muted,fontWeight:'700',letterSpacing:'.8px',marginBottom:'8px'}}>COR</p>
                <div style={{display:'flex',gap:'8px'}}>
                  {colors.map(c=><button key={c} onClick={()=>upd(m.id,'color',c)} style={{width:'24px',height:'24px',borderRadius:'50%',background:c,border:`2.5px solid ${m.color===c?T.ink:'transparent'}`}}/>)}
                </div>
              </div>
            ))}
            <button onClick={()=>setList([...list,{id:String(Date.now()),name:'Novo Membro',emoji:'🌸',color:colors[1]}])} style={{width:'100%',padding:'14px',background:'none',border:`2px dashed ${T.border}`,borderRadius:'16px',color:T.muted,fontSize:'14px',marginBottom:'12px'}}>+ Adicionar membro</button>
            <button onClick={()=>onSave(list)} style={{width:'100%',padding:'15px',background:T.sage,color:'white',border:'none',borderRadius:'14px',fontSize:'15px',fontWeight:'800'}}>Salvar</button>
          </div>
        </div>
      );
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // HOME SCREEN
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function HomeScreen({ user, theme, dev, prayer, comments, loading, onMarkRead, onAddComment, hasRead, members }) {
      const [tab, setTab] = useState('dev');
      const [comment, setComment] = useState('');
      const [speaking, setSpeaking] = useState(false);
      const gm = id => members.find(m=>m.id===id)||{emoji:'👤',name:'Membro',color:T.muted};
      const toggleSpeak = text => { if(speaking){stopSpeak();setSpeaking(false);}else{setSpeaking(true);speak(text,()=>setSpeaking(false));} };
      return (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{padding:'20px 20px 14px',background:T.white,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
            <p style={{fontSize:'12px',color:T.muted,textTransform:'capitalize'}}>{fmtDate()}</p>
            <h2 style={{fontFamily:"'Lora',serif",fontSize:'20px',fontWeight:'700',color:T.ink,marginTop:'4px'}}>{user.emoji} Olá, {user.name}</h2>
            {theme&&<div style={{marginTop:'12px',background:T.sageLt,borderRadius:'10px',padding:'10px 14px',display:'flex',alignItems:'center',gap:'10px',border:`1px solid ${T.sage}22`}}>
              <span style={{fontSize:'16px'}}>📖</span>
              <div>
                <p style={{fontSize:'10px',color:T.sage,fontWeight:'700',letterSpacing:'.8px',textTransform:'uppercase'}}>Tema desta semana</p>
                <p style={{fontSize:'14px',color:T.ink,fontWeight:'700',marginTop:'1px'}}>{theme.theme}</p>
              </div>
            </div>}
          </div>
          <div style={{padding:'14px 20px 0',background:T.white,flexShrink:0}}>
            <div style={{display:'flex',background:T.parchment,borderRadius:'12px',padding:'3px'}}>
              {[['dev','📖 Devocional'],['prayer','🙏 Oração']].map(([t,lbl])=>(
                <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:'9px',border:'none',borderRadius:'9px',background:tab===t?T.white:'transparent',color:tab===t?T.sage:T.muted,fontWeight:tab===t?'700':'500',fontSize:'13px',boxShadow:tab===t?'0 1px 6px rgba(0,0,0,.1)':'none',transition:'all .2s'}}>{lbl}</button>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'20px'}}>
            {loading?(
              <div style={{textAlign:'center',padding:'80px 20px'}} className="fi">
                <div style={{fontSize:'42px',marginBottom:'18px'}} className="pulse">✨</div>
                <p style={{fontFamily:"'Lora',serif",color:T.muted,fontStyle:'italic',fontSize:'16px'}}>Preparando o devocional do dia...</p>
                <p style={{color:T.muted,fontSize:'12px',marginTop:'8px',opacity:.7}}>A IA está gerando seu conteúdo</p>
              </div>
            ):!dev?(
              <div style={{textAlign:'center',padding:'80px 20px'}}><p style={{color:T.muted}}>Sem conteúdo disponível.</p></div>
            ):tab==='dev'?(
              <div className="fi">
                <div style={{background:`linear-gradient(145deg,${T.sage} 0%,#2E5245 100%)`,borderRadius:'20px',padding:'24px',marginBottom:'22px',color:'white',position:'relative',overflow:'hidden'}}>
                  <div style={{position:'absolute',top:'-30px',right:'-30px',width:'130px',height:'130px',borderRadius:'50%',background:'rgba(255,255,255,.06)'}}/>
                  <p style={{fontSize:'10px',opacity:.7,fontWeight:'700',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:'10px'}}>Versículo do dia · ARC</p>
                  <p style={{fontFamily:"'Lora',serif",fontSize:'16px',lineHeight:'1.78',fontStyle:'italic',marginBottom:'12px'}}>"{dev.verseText}"</p>
                  <p style={{fontSize:'13px',opacity:.85,fontWeight:'600'}}>— {dev.verse}</p>
                  <button onClick={()=>toggleSpeak(dev.verseText)} style={{marginTop:'14px',background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',borderRadius:'8px',color:'white',padding:'8px 16px',fontSize:'12px',fontWeight:'700'}}>
                    {speaking?'⏹ Parar':'▶ Ouvir versículo'}
                  </button>
                </div>
                <h3 style={{fontFamily:"'Lora',serif",fontSize:'21px',fontWeight:'700',color:T.ink,marginBottom:'16px',lineHeight:'1.35'}}>{dev.title}</h3>
                {dev.reflection.split(/\n+/).filter(Boolean).map((p,i)=>(
                  <p key={i} style={{fontSize:'15px',color:'#3A3530',lineHeight:'1.88',marginBottom:'16px'}}>{p}</p>
                ))}
                <button onClick={()=>toggleSpeak(`${dev.title}. ${dev.reflection}`)} style={{display:'flex',alignItems:'center',gap:'8px',padding:'10px 18px',border:`1.5px solid ${T.border}`,borderRadius:'10px',background:'transparent',color:T.muted,fontSize:'13px',fontWeight:'700',marginBottom:'20px'}}>
                  {speaking?'⏹ Parar':'▶ Ouvir devocional completo'}
                </button>
                {!hasRead?(
                  <button onClick={onMarkRead} style={{width:'100%',padding:'15px',background:T.sage,color:'white',border:'none',borderRadius:'14px',fontSize:'15px',fontWeight:'800',marginBottom:'24px',boxShadow:`0 5px 18px ${T.sage}44`}}>
                    ✓ Concluir devocional de hoje
                  </button>
                ):(
                  <div style={{textAlign:'center',padding:'13px',background:T.sageLt,borderRadius:'12px',color:T.sage,fontWeight:'700',marginBottom:'24px',border:`1px solid ${T.sage}33`}}>
                    ✓ Devocional concluído! +1 ponto 🎉
                  </div>
                )}
                <div>
                  <h4 style={{fontFamily:"'Lora',serif",fontSize:'16px',fontWeight:'600',color:T.ink,marginBottom:'14px'}}>💬 Reflexões da família {comments.length>0&&`(${comments.length})`}</h4>
                  {comments.map(c=>{const m=gm(c.authorId);return(
                    <div key={c.id} style={{background:T.white,border:`1px solid ${T.border}`,borderRadius:'14px',padding:'14px',marginBottom:'10px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'7px'}}>
                        <span style={{fontSize:'18px'}}>{m.emoji}</span>
                        <span style={{fontSize:'13px',fontWeight:'700',color:T.ink}}>{m.name}</span>
                        <span style={{fontSize:'11px',color:T.muted,marginLeft:'auto'}}>{c.time}</span>
                      </div>
                      <p style={{fontSize:'14px',color:'#3A3530',lineHeight:'1.65'}}>{c.text}</p>
                    </div>
                  );})}
                  <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                    <input value={comment} onChange={e=>setComment(e.target.value)} placeholder="Compartilhe sua reflexão..." onKeyDown={e=>e.key==='Enter'&&comment.trim()&&(onAddComment(comment.trim()),setComment(''))}
                      style={{flex:1,padding:'12px 16px',border:`1px solid ${T.border}`,borderRadius:'12px',fontSize:'14px',outline:'none',background:T.white,color:T.ink}}/>
                    <button onClick={()=>{if(comment.trim()){onAddComment(comment.trim());setComment('');}}} style={{padding:'12px 16px',background:T.sage,color:'white',border:'none',borderRadius:'12px',fontSize:'18px'}}>›</button>
                  </div>
                </div>
              </div>
            ):(
              <div className="fi">
                {prayer&&<div style={{background:T.amberLt,borderRadius:'20px',padding:'24px',borderLeft:`4px solid ${T.amber}`}}>
                  <p style={{fontSize:'11px',color:T.amber,fontWeight:'700',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'14px'}}>🙏 Oração do Dia</p>
                  {prayer.text.split(/\n+/).filter(Boolean).map((p,i)=>(
                    <p key={i} style={{fontFamily:"'Lora',serif",color:T.ink,fontSize:'16px',lineHeight:'1.88',fontStyle:'italic',marginBottom:'16px'}}>{p}</p>
                  ))}
                  <button onClick={()=>toggleSpeak(prayer.text)} style={{display:'flex',alignItems:'center',gap:'8px',padding:'10px 18px',border:`1.5px solid ${T.amber}66`,borderRadius:'10px',background:'transparent',color:T.amber,fontSize:'13px',fontWeight:'700'}}>
                    {speaking?'⏹ Parar':'▶ Ouvir oração'}
                  </button>
                </div>}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // BOARD SCREEN
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function BoardScreen({ members, progress }) {
      const TOTAL=10;
      const PATH=[{x:15,y:85},{x:30,y:70},{x:50,y:80},{x:68,y:65},{x:82,y:74},{x:88,y:55},{x:74,y:40},{x:56,y:33},{x:38,y:47},{x:20,y:37},{x:10,y:20}];
      const gp=id=>{const p=progress[id]||{};const d=(p.devotionals||[]).length;const ms=(p.missions||[]).length;return{d,ms,total:Math.min(d+ms,TOTAL)};};
      const sorted=[...members].sort((a,b)=>gp(b.id).total-gp(a.id).total);
      return (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{padding:'20px 20px 14px',background:T.white,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
            <h2 style={{fontFamily:"'Lora',serif",fontSize:'20px',fontWeight:'700',color:T.ink}}>🗺️ Jornada da Família</h2>
            <p style={{fontSize:'13px',color:T.muted,marginTop:'4px'}}>Quem está avançando na caminhada?</p>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'20px'}}>
            <div style={{background:'linear-gradient(155deg,#D6EBE2 0%,#E2DDD5 55%,#EDE5D8 100%)',borderRadius:'22px',padding:'20px',marginBottom:'24px',position:'relative',height:'230px',border:`1px solid ${T.border}`,overflow:'hidden'}}>
              <span style={{position:'absolute',top:'10px',left:'18px',fontSize:'22px',opacity:.35}}>🌿</span>
              <span style={{position:'absolute',top:'35%',right:'14px',fontSize:'18px',opacity:.3}}>🌸</span>
              <span style={{position:'absolute',bottom:'22px',left:'42%',fontSize:'13px',opacity:.3}}>✦</span>
              <svg style={{position:'absolute',top:0,left:0,width:'100%',height:'100%'}} viewBox="0 0 100 100" preserveAspectRatio="none">
                <polyline points={PATH.map(p=>`${p.x},${p.y}`).join(' ')} fill="none" stroke="rgba(61,105,89,.22)" strokeWidth="1.8" strokeDasharray="3,3"/>
              </svg>
              {PATH.map((p,i)=>(
                <div key={i} style={{position:'absolute',left:`${p.x}%`,top:`${p.y}%`,width:i===PATH.length-1?'18px':'12px',height:i===PATH.length-1?'18px':'12px',borderRadius:'50%',background:i===PATH.length-1?'#FFD700':'rgba(255,255,255,.75)',border:`1.5px solid ${i===PATH.length-1?'#C9A600':'rgba(61,105,89,.28)'}`,transform:'translate(-50%,-50%)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'8px',boxShadow:'0 1px 5px rgba(0,0,0,.12)'}}>
                  {i===PATH.length-1?'⭐':''}
                </div>
              ))}
              {members.map((m,mi)=>{
                const{total}=gp(m.id);const pos=PATH[total]||PATH[0];
                return(
                  <div key={m.id} style={{position:'absolute',left:`${pos.x}%`,top:`${pos.y}%`,transform:`translate(${mi%2===0?'-130%':'20%'},-50%)`,textAlign:'center',transition:'all .7s cubic-bezier(.34,1.56,.64,1)'}}>
                    <div style={{width:'32px',height:'32px',borderRadius:'50%',background:T.white,border:`2.5px solid ${m.color}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'15px',boxShadow:`0 3px 12px ${m.color}55`}}>{m.emoji}</div>
                    <div style={{fontSize:'8px',fontWeight:'800',color:T.ink,marginTop:'2px',background:'rgba(255,255,255,.88)',borderRadius:'4px',padding:'1px 5px',whiteSpace:'nowrap'}}>{m.name}</div>
                  </div>
                );
              })}
              <div style={{position:'absolute',bottom:'8px',right:'10px',fontSize:'9px',color:T.muted,fontWeight:'700'}}>Meta: ⭐ {TOTAL} pts</div>
            </div>
            <h4 style={{fontFamily:"'Lora',serif",fontSize:'16px',fontWeight:'600',color:T.ink,marginBottom:'14px'}}>Placar</h4>
            {sorted.map((m,i)=>{const p=gp(m.id);return(
              <div key={m.id} style={{background:T.white,border:`1px solid ${T.border}`,borderRadius:'16px',padding:'16px',marginBottom:'10px',display:'flex',alignItems:'center',gap:'14px'}}>
                <div style={{width:'30px',height:'30px',borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px'}}>{['🥇','🥈','🥉'][i]||<span style={{fontSize:'11px',fontWeight:'700',color:T.muted}}>{i+1}</span>}</div>
                <div style={{width:'40px',height:'40px',borderRadius:'50%',background:`${m.color}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',border:`2px solid ${m.color}44`,flexShrink:0}}>{m.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}>
                    <span style={{fontWeight:'700',color:T.ink,fontSize:'14px'}}>{m.name}</span>
                    <span style={{fontSize:'15px',color:T.sage,fontWeight:'800'}}>{p.total} pts</span>
                  </div>
                  <div style={{height:'6px',background:T.parchment,borderRadius:'3px',overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:'3px',background:`linear-gradient(90deg,${T.sage},${T.amber})`,width:`${(p.total/TOTAL)*100}%`,transition:'width .7s ease'}}/>
                  </div>
                  <div style={{display:'flex',gap:'14px',marginTop:'6px'}}>
                    <span style={{fontSize:'11px',color:T.muted}}>📖 {p.d} devocionais</span>
                    <span style={{fontSize:'11px',color:T.muted}}>⚔️ {p.ms} missões</span>
                  </div>
                </div>
              </div>
            );})}
          </div>
        </div>
      );
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // PRAYERS SCREEN
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function PrayersScreen({ user, wall, onAdd, onPray, members }) {
      const [text, setText] = useState('');
      const [open, setOpen] = useState(false);
      const gm=id=>members.find(m=>m.id===id)||{emoji:'👤',name:'Membro',color:T.muted};
      return (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{padding:'20px 20px 14px',background:T.white,borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
            <div>
              <h2 style={{fontFamily:"'Lora',serif",fontSize:'20px',fontWeight:'700',color:T.ink}}>🙏 Mural de Orações</h2>
              <p style={{fontSize:'13px',color:T.muted,marginTop:'4px'}}>Pedidos e intercessões da família</p>
            </div>
            <button onClick={()=>setOpen(true)} style={{background:T.sage,color:'white',border:'none',borderRadius:'12px',padding:'10px 16px',fontSize:'13px',fontWeight:'700',boxShadow:`0 4px 14px ${T.sage}44`}}>+ Pedir</button>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'20px'}}>
            {open&&<div className="fu" style={{background:T.amberLt,borderRadius:'16px',padding:'16px',marginBottom:'20px',border:`1px solid ${T.amber}44`}}>
              <p style={{fontFamily:"'Lora',serif",fontWeight:'600',color:T.ink,marginBottom:'10px'}}>Novo pedido de oração</p>
              <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Compartilhe seu pedido com a família..."
                style={{width:'100%',padding:'12px',border:`1px solid ${T.border}`,borderRadius:'10px',fontSize:'14px',outline:'none',minHeight:'80px',resize:'none',background:'white',color:T.ink,lineHeight:1.65}}/>
              <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                <button onClick={()=>{if(text.trim()){onAdd(text.trim());setText('');setOpen(false);}}} style={{flex:1,padding:'11px',background:T.sage,color:'white',border:'none',borderRadius:'10px',fontWeight:'700'}}>Enviar</button>
                <button onClick={()=>{setOpen(false);setText('');}} style={{padding:'11px 16px',background:'none',border:`1px solid ${T.border}`,borderRadius:'10px',color:T.muted}}>Cancelar</button>
              </div>
            </div>}
            {wall.length===0&&<div style={{textAlign:'center',padding:'80px 20px'}}><div style={{fontSize:'50px',marginBottom:'14px'}}>🕊️</div><p style={{fontFamily:"'Lora',serif",color:T.muted,fontStyle:'italic'}}>Nenhum pedido ainda. Seja a primeira!</p></div>}
            {wall.map(p=>{const author=gm(p.authorId);const prayed=p.prayedBy.includes(user.id);return(
              <div key={p.id} style={{background:T.white,border:`1px solid ${T.border}`,borderRadius:'16px',padding:'16px',marginBottom:'12px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
                  <div style={{width:'36px',height:'36px',borderRadius:'50%',background:`${author.color}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',border:`2px solid ${author.color}33`}}>{author.emoji}</div>
                  <div><p style={{fontWeight:'700',color:T.ink,fontSize:'14px'}}>{author.name}</p><p style={{fontSize:'11px',color:T.muted}}>{p.date}</p></div>
                </div>
                <p style={{fontSize:'14px',color:'#3A3530',lineHeight:'1.72',marginBottom:'14px'}}>{p.text}</p>
                <div style={{display:'flex',alignItems:'center',gap:'10px',borderTop:`1px solid ${T.border}`,paddingTop:'12px'}}>
                  <button onClick={()=>!prayed&&onPray(p.id)} style={{padding:'8px 16px',border:'none',borderRadius:'10px',background:prayed?T.sageLt:T.sage,color:prayed?T.sage:'white',fontSize:'13px',fontWeight:'700'}}>
                    {prayed?'✓ Orei por você':'🙏 Orar'}
                  </button>
                  {p.prayedBy.length>0&&<span style={{fontSize:'13px',color:T.muted}}>{p.prayedBy.map(id=>gm(id).emoji).join(' ')} {p.prayedBy.length===1?'orou':'oraram'}</span>}
                </div>
              </div>
            );})}
          </div>
        </div>
      );
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // MISSIONS SCREEN
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function MissionsScreen({ user, missions, theme, onComplete, members }) {
      const gm=id=>members.find(m=>m.id===id)||{emoji:'👤',name:'Membro',color:T.muted};
      const done=missions.filter(m=>m.completedBy.includes(user.id)).length;
      return (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{padding:'20px 20px 14px',background:T.white,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
            <h2 style={{fontFamily:"'Lora',serif",fontSize:'20px',fontWeight:'700',color:T.ink}}>⚔️ Missões da Semana</h2>
            {theme&&<p style={{fontSize:'13px',color:T.muted,marginTop:'4px'}}>Tema: {theme.theme}</p>}
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'20px'}}>
            {missions.length>0&&<div style={{background:T.sageLt,borderRadius:'14px',padding:'16px',marginBottom:'20px',border:`1px solid ${T.sage}33`,display:'flex',alignItems:'center',gap:'14px'}}>
              <span style={{fontSize:'32px'}}>🎯</span>
              <div><p style={{fontWeight:'700',color:T.sage,fontSize:'15px'}}>{done}/{missions.length} completas</p><p style={{fontSize:'12px',color:T.muted,marginTop:'2px'}}>Cada missão = +1 ponto no tabuleiro</p></div>
            </div>}
            {missions.length===0&&<div style={{textAlign:'center',padding:'80px 20px'}}><p style={{fontFamily:"'Lora',serif",color:T.muted,fontStyle:'italic'}}>As missões aparecem após gerar o tema semanal.</p></div>}
            {missions.map((ms,i)=>{const isDone=ms.completedBy.includes(user.id);return(
              <div key={ms.id} className="fu" style={{background:T.white,border:`1.5px solid ${isDone?T.sage+'44':T.border}`,borderRadius:'16px',padding:'16px',marginBottom:'12px',animationDelay:`${i*.07}s`,opacity:0}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:'14px'}}>
                  <div style={{width:'34px',height:'34px',borderRadius:'50%',flexShrink:0,background:isDone?T.sage:T.parchment,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'15px',color:isDone?'white':T.muted,fontWeight:'800'}}>{isDone?'✓':i+1}</div>
                  <div style={{flex:1}}>
                    <p style={{fontSize:'15px',color:isDone?T.muted:T.ink,lineHeight:'1.55',textDecoration:isDone?'line-through':'none',marginBottom:'10px'}}>{ms.text}</p>
                    {ms.completedBy.length>0&&<div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap',marginBottom:'10px'}}>
                      <span style={{fontSize:'11px',color:T.muted}}>Concluiu:</span>
                      {ms.completedBy.map(id=>{const m=gm(id);return<span key={id} style={{fontSize:'13px',background:`${m.color}18`,borderRadius:'20px',padding:'2px 10px',border:`1px solid ${m.color}44`}}>{m.emoji} {m.name}</span>;})}
                    </div>}
                    {!isDone&&<button onClick={()=>onComplete(ms.id)} style={{padding:'8px 16px',background:T.amberLt,border:`1.5px solid ${T.amber}66`,borderRadius:'10px',fontSize:'13px',color:T.amber,fontWeight:'700'}}>✅ Completar missão</button>}
                  </div>
                </div>
              </div>
            );})}
          </div>
        </div>
      );
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // BOTTOM NAV
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function BottomNav({ active, onChange }) {
      const tabs=[{id:'home',icon:'📖',label:'Hoje'},{id:'board',icon:'🗺️',label:'Jornada'},{id:'prayers',icon:'🙏',label:'Orações'},{id:'missions',icon:'⚔️',label:'Missões'}];
      return(
        <div style={{background:T.white,borderTop:`1px solid ${T.border}`,display:'flex',padding:'8px 0 16px',boxShadow:'0 -4px 24px rgba(0,0,0,.07)',flexShrink:0}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>onChange(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',background:'none',border:'none',padding:'6px 0',color:active===t.id?T.sage:T.muted,transition:'all .2s'}}>
              <span style={{fontSize:'20px'}}>{t.icon}</span>
              <span style={{fontSize:'10px',fontWeight:active===t.id?'800':'500'}}>{t.label}</span>
              {active===t.id&&<div style={{width:'20px',height:'2.5px',background:T.sage,borderRadius:'2px'}}/>}
            </button>
          ))}
        </div>
      );
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // ROOT APP
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function App() {
      const [view, setView] = useState('loading');
      const [tab, setTab] = useState('home');
      const [user, setUser] = useState(null);
      const [members, setMembers] = useState([]);
      const [theme, setTheme] = useState(null);
      const [dev, setDev] = useState(null);
      const [prayer, setPrayer] = useState(null);
      const [comments, setComments] = useState([]);
      const [wall, setWall] = useState([]);
      const [missions, setMissions] = useState([]);
      const [progress, setProgress] = useState({});
      const [loading, setLoading] = useState(false);

      const DEF=[{id:'1',name:'Bela',emoji:'🌿',color:'#3D6959'},{id:'2',name:'Membro 2',emoji:'🌸',color:'#C4956A'},{id:'3',name:'Membro 3',emoji:'✨',color:'#7B8EC8'}];

      useEffect(()=>{(async()=>{
        const hasKey=!!localStorage.getItem('apiKey');
        const[m,th,d,pr,cm,wl,ms,pg]=await Promise.all([store.get('members'),store.get(`theme-${WEEK_KEY}`),store.get(`dev-${TODAY}`),store.get(`prayer-${TODAY}`),store.get(`comments-${TODAY}`),store.get('wall'),store.get(`missions-${WEEK_KEY}`),store.get('progress')]);
        if(m)setMembers(m);else{setMembers(DEF);await store.set('members',DEF);}
        if(th)setTheme(th);if(d)setDev(d);if(pr)setPrayer(pr);
        setComments(cm||[]);setWall(wl||[]);setMissions(ms||[]);setProgress(pg||{});
        setView(hasKey?'login':'apikey');
      })();},[]);

      async function genWeekly(){
        setLoading(true);
        try{
          const raw=await callClaude(`Gere um tema semanal de devocional familiar cristão. Responda SOMENTE JSON válido sem markdown:\n{"theme":"Título curto","description":"1 frase","verse":"Referência ARC","verseText":"texto ARC","missions":[{"id":"1","text":"missão"},{"id":"2","text":"missão"},{"id":"3","text":"missão"},{"id":"4","text":"missão"},{"id":"5","text":"missão"}]}`,'Pastor cristão, devocionais familiares em português brasileiro. ARC. Caloroso e prático.');
          const th=extractJSON(raw);
          setTheme(th);await store.set(`theme-${WEEK_KEY}`,th);
          const ms=th.missions.map(m=>({...m,completedBy:[]}));
          setMissions(ms);await store.set(`missions-${WEEK_KEY}`,ms);
          await genDaily(th);
        }catch(e){console.error(e);setLoading(false);}
      }

      async function genDaily(th){
        setLoading(true);
        try{
          const raw=await callClaude(`Tema: "${th.theme}". Versículo: ${th.verse}.\nGere o devocional do dia. SOMENTE JSON sem markdown:\n{"title":"título","verse":"Referência","verseText":"texto ARC completo","reflection":"3-4 parágrafos separados por \\n\\n","prayer":"2-3 parágrafos separados por \\n\\n"}`,'Pastor cristão, devocionais familiares português brasileiro. ARC. Profundo, prático e amoroso.');
          const d=extractJSON(raw);
          setDev(d);await store.set(`dev-${TODAY}`,d);
          const pr={text:d.prayer};setPrayer(pr);await store.set(`prayer-${TODAY}`,pr);
        }catch(e){console.error(e);setDev({title:'Erro ao gerar devocional',verse:'',verseText:'Tente recarregar a página. Erro: '+e.message,reflection:'',prayer:''});}
        setLoading(false);
      }

      async function handleLogin(m){
        setUser(m);setView('app');setTab('home');
        if(!theme)await genWeekly();else if(!dev)await genDaily(theme);
      }

      async function markRead(){
        const p={...progress};
        if(!p[user.id])p[user.id]={devotionals:[],missions:[]};
        if(!(p[user.id].devotionals||[]).includes(TODAY))p[user.id].devotionals=[...(p[user.id].devotionals||[]),TODAY];
        setProgress(p);await store.set('progress',p);
      }

      async function addComment(text){
        const c={id:Date.now(),authorId:user.id,text,time:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})};
        const nc=[...comments,c];setComments(nc);await store.set(`comments-${TODAY}`,nc);
      }

      async function addPrayer(text){
        const p={id:Date.now(),authorId:user.id,text,prayedBy:[],date:new Date().toLocaleDateString('pt-BR')};
        const nw=[p,...wall];setWall(nw);await store.set('wall',nw);
      }

      async function prayFor(id){
        const nw=wall.map(p=>p.id===id&&!p.prayedBy.includes(user.id)?{...p,prayedBy:[...p.prayedBy,user.id]}:p);
        setWall(nw);await store.set('wall',nw);
      }

      async function completeMission(mid){
        const nm=missions.map(m=>m.id===mid&&!m.completedBy.includes(user.id)?{...m,completedBy:[...m.completedBy,user.id]}:m);
        setMissions(nm);await store.set(`missions-${WEEK_KEY}`,nm);
        const p={...progress};
        if(!p[user.id])p[user.id]={devotionals:[],missions:[]};
        if(!(p[user.id].missions||[]).includes(mid))p[user.id].missions=[...(p[user.id].missions||[]),mid];
        setProgress(p);await store.set('progress',p);
      }

      async function saveMembers(list){setMembers(list);await store.set('members',list);setView('login');}

      const hasRead=!!(progress[user?.id]?.devotionals||[]).includes(TODAY);

      if(view==='loading')return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:T.cream}}><div style={{fontSize:'40px'}} className="pulse">🕊️</div></div>;
      if(view==='apikey')return <ApiKeyScreen onSave={()=>setView('login')}/>;
      if(view==='setup')return <SetupScreen members={members} onSave={saveMembers} onBack={()=>setView('login')}/>;
      if(view==='login')return <LoginScreen members={members} onLogin={handleLogin} onSetup={()=>setView('setup')}/>;

      return(
        <div style={{height:'100vh',display:'flex',flexDirection:'column',background:T.cream,maxWidth:'480px',margin:'0 auto',overflow:'hidden'}}>
          {tab==='home'&&<HomeScreen user={user} theme={theme} dev={dev} prayer={prayer} comments={comments} loading={loading} onMarkRead={markRead} onAddComment={addComment} hasRead={hasRead} members={members}/>}
          {tab==='board'&&<BoardScreen members={members} progress={progress}/>}
          {tab==='prayers'&&<PrayersScreen user={user} wall={wall} onAdd={addPrayer} onPray={prayFor} members={members}/>}
          {tab==='missions'&&<MissionsScreen user={user} missions={missions} theme={theme} onComplete={completeMission} members={members}/>}
          <BottomNav active={tab} onChange={setTab}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <script>
    // Register PWA service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
