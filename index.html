<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2C4A3E">
  <title>Nossa Família</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #2C4A3E;
      --forest-lt: #3D6959;
      --moss: #E8F0EC;
      --parch: #F7F2EA;
      --cream: #FBF7F0;
      --amber: #C97D3A;
      --amber-lt: #FBF0DF;
      --ink: #1A1814;
      --muted: #7A7060;
      --border: #E0D8CC;
      --white: #FEFDFB;
      --red: #C0504D;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--ink);}
    button,input,textarea,select{font-family:'DM Sans',sans-serif;}
    ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .fu{animation:fadeUp .4s ease forwards;}
    .fi{animation:fadeIn .3s ease forwards;}
    .pulse{animation:pulse 1.8s ease infinite;}

    /* ── LAYOUT ── */
    #root{height:100%;display:flex;flex-direction:column;}
    .screen{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

    /* ── TOPBAR ── */
    .topbar{
      background:var(--white);border-bottom:1px solid var(--border);
      padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;
      position:sticky;top:0;z-index:10;
    }
    .topbar-back{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;padding:4px;}
    .topbar h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--ink);}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}

    /* ── BOTTOM NAV ── */
    .bottom-nav{
      background:var(--white);border-top:1px solid var(--border);
      display:flex;padding:8px 0 max(16px,env(safe-area-inset-bottom));
      box-shadow:0 -4px 24px rgba(0,0,0,.06);flex-shrink:0;
    }
    .nav-btn{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
      background:none;border:none;cursor:pointer;padding:6px 0;
      color:var(--muted);transition:color .2s;
    }
    .nav-btn.active{color:var(--forest);}
    .nav-btn span:first-child{font-size:20px;}
    .nav-btn span:last-child{font-size:10px;font-weight:600;letter-spacing:.2px;}
    .nav-indicator{width:18px;height:2.5px;background:var(--forest);border-radius:2px;margin-top:2px;}

    /* ── BUTTONS ── */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      border:none;border-radius:12px;cursor:pointer;font-weight:600;
      transition:all .2s;font-size:14px;padding:12px 20px;
    }
    .btn:active{transform:scale(.97);}
    .btn-primary{background:var(--forest);color:#fff;box-shadow:0 4px 16px rgba(44,74,62,.3);}
    .btn-primary:hover{background:var(--forest-lt);transform:translateY(-1px);}
    .btn-secondary{background:var(--moss);color:var(--forest);border:1px solid rgba(44,74,62,.15);}
    .btn-amber{background:var(--amber-lt);color:var(--amber);border:1px solid rgba(201,125,58,.2);}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
    .btn-full{width:100%;}
    .btn-sm{padding:8px 14px;font-size:13px;border-radius:9px;}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}

    /* ── CARDS ── */
    .card{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:18px;}
    .card-verse{
      background:linear-gradient(145deg,var(--forest) 0%,#1E3530 100%);
      border-radius:20px;padding:24px;color:#fff;position:relative;overflow:hidden;
    }
    .card-verse::before{
      content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;
      border-radius:50%;background:rgba(255,255,255,.05);
    }
    .card-verse::after{
      content:'';position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;
      border-radius:50%;background:rgba(255,255,255,.04);
    }

    /* ── INPUTS ── */
    .input{
      width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;
      font-size:15px;outline:none;background:var(--white);color:var(--ink);
      transition:border-color .2s;
    }
    .input:focus{border-color:var(--forest);}
    .textarea{resize:none;min-height:80px;line-height:1.65;}

    /* ── TABS ── */
    .tabs{display:flex;background:var(--parch);border-radius:12px;padding:3px;gap:3px;}
    .tab{
      flex:1;padding:9px;border:none;border-radius:9px;background:transparent;
      color:var(--muted);font-weight:500;cursor:pointer;font-size:13px;transition:all .2s;
    }
    .tab.active{background:var(--white);color:var(--forest);font-weight:700;box-shadow:0 1px 6px rgba(0,0,0,.09);}

    /* ── BADGE ── */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
    .badge-green{background:var(--moss);color:var(--forest);}
    .badge-amber{background:var(--amber-lt);color:var(--amber);}

    /* ── ALERT ── */
    .alert{padding:14px 16px;border-radius:12px;font-size:13px;line-height:1.6;}
    .alert-amber{background:var(--amber-lt);border:1px solid rgba(201,125,58,.25);color:#7A4A1A;}
    .alert-green{background:var(--moss);border:1px solid rgba(44,74,62,.2);color:var(--forest);}
    .alert-red{background:#FDE8E8;border:1px solid #F5C0C0;color:var(--red);}

    /* ── MEMBER AVATAR ── */
    .avatar{
      width:42px;height:42px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:20px;flex-shrink:0;
    }

    /* ── LOADING SKELETON ── */
    .skel{
      background:linear-gradient(90deg,var(--parch) 25%,var(--border) 50%,var(--parch) 75%);
      background-size:200% 100%;animation:shimmer 1.4s ease infinite;border-radius:8px;
    }

    /* ── LOGIN ── */
    #login-screen{
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:32px 24px;
      background:radial-gradient(ellipse at 30% 0%,#D4E8DF 0%,var(--cream) 55%);
    }
    .login-hero{text-align:center;margin-bottom:40px;}
    .login-dove{font-size:64px;filter:drop-shadow(0 8px 20px rgba(44,74,62,.2));margin-bottom:18px;display:block;}
    .login-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--ink);line-height:1.2;}
    .login-sub{color:var(--muted);margin-top:8px;font-size:15px;}
    .login-date{color:var(--muted);font-size:12px;margin-top:6px;opacity:.7;text-transform:capitalize;}
    .member-btn{
      background:var(--white);border:1.5px solid var(--border);border-radius:18px;
      padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;
      text-align:left;width:100%;max-width:320px;transition:all .2s;
      box-shadow:0 2px 12px rgba(0,0,0,.05);
    }
    .member-btn:hover,.member-btn:focus{border-color:var(--forest);transform:translateY(-2px);box-shadow:0 8px 24px rgba(44,74,62,.15);}
    .member-btn-info p:first-child{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--ink);}
    .member-btn-info p:last-child{font-size:12px;color:var(--muted);margin-top:2px;}
    .member-btn-arrow{margin-left:auto;color:var(--border);font-size:20px;}

    /* ── SETUP ── */
    .setup-member{border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;background:var(--white);}
    .emoji-grid{display:flex;gap:6px;flex-wrap:wrap;}
    .emoji-btn{width:34px;height:34px;border-radius:8px;font-size:18px;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;}
    .emoji-btn.sel{border-color:var(--forest);background:var(--moss);}
    .color-grid{display:flex;gap:8px;}
    .color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;transition:all .15s;border:2.5px solid transparent;}
    .color-dot.sel{border-color:var(--ink);}

    /* ── HOME ── */
    .home-header{padding:18px 20px 14px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;}
    .home-greeting-date{font-size:12px;color:var(--muted);text-transform:capitalize;margin-bottom:4px;}
    .home-greeting{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:10px;}
    .theme-chip{margin-top:12px;background:var(--moss);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;border:1px solid rgba(44,74,62,.12);}
    .theme-chip-label{font-size:10px;color:var(--forest);font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
    .theme-chip-name{font-size:14px;color:var(--ink);font-weight:600;margin-top:2px;}
    .home-tabs{padding:14px 20px 0;background:var(--white);flex-shrink:0;}

    .verse-label{font-size:10px;opacity:.65;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
    .verse-text{font-family:'Playfair Display',serif;font-size:16px;line-height:1.82;font-style:italic;margin-bottom:12px;position:relative;z-index:1;}
    .verse-ref{font-size:13px;opacity:.8;font-weight:600;position:relative;z-index:1;}
    .dev-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:16px;}
    .dev-para{font-size:15px;color:#3A3530;line-height:1.9;margin-bottom:16px;}
    .audio-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border:1.5px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
    .audio-btn:hover{border-color:var(--forest);color:var(--forest);}
    .audio-btn.playing{border-color:var(--amber);color:var(--amber);background:var(--amber-lt);}
    .done-banner{text-align:center;padding:13px;background:var(--moss);border-radius:12px;color:var(--forest);font-weight:700;border:1px solid rgba(44,74,62,.2);margin-bottom:22px;}

    /* Comment */
    .comment-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
    .comment-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .comment-author{font-size:13px;font-weight:700;color:var(--ink);}
    .comment-time{font-size:11px;color:var(--muted);margin-left:auto;}
    .comment-text{font-size:14px;color:#3A3530;line-height:1.68;}
    .comment-input-row{display:flex;gap:8px;margin-top:12px;}
    .comment-send{padding:12px 16px;background:var(--forest);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:17px;transition:background .2s;}
    .comment-send:hover{background:var(--forest-lt);}

    /* Prayer tab */
    .prayer-box{background:var(--amber-lt);border-radius:20px;padding:24px;border-left:4px solid var(--amber);}
    .prayer-label{font-size:11px;color:var(--amber);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
    .prayer-para{font-family:'Playfair Display',serif;color:var(--ink);font-size:16px;line-height:1.9;font-style:italic;margin-bottom:16px;}

    /* ── BOARD ── */
    .map-container{
      background:linear-gradient(155deg,#CCE5D8 0%,#DDD8CF 55%,#EAE3D5 100%);
      border-radius:22px;height:220px;position:relative;overflow:hidden;
      border:1px solid var(--border);margin-bottom:22px;
    }
    .map-decoration{position:absolute;pointer-events:none;opacity:.3;}
    .path-dot{position:absolute;transform:translate(-50%,-50%);border-radius:50%;transition:all .6s cubic-bezier(.34,1.56,.64,1);}
    .path-dot-normal{width:11px;height:11px;background:rgba(255,255,255,.8);border:1.5px solid rgba(44,74,62,.25);}
    .path-dot-goal{width:17px;height:17px;background:#FFD700;border:2px solid #C9A600;display:flex;align-items:center;justify-content:center;font-size:8px;}
    .member-token{position:absolute;transform:translate(-50%,-50%);text-align:center;transition:all .8s cubic-bezier(.34,1.56,.64,1);}
    .token-circle{width:34px;height:34px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 12px rgba(0,0,0,.18);}
    .token-name{font-size:8px;font-weight:800;color:var(--ink);background:rgba(255,255,255,.9);border-radius:4px;padding:1px 5px;margin-top:2px;white-space:nowrap;}

    .rank-row{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:15px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
    .rank-medal{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
    .progress-bar-wrap{height:6px;background:var(--parch);border-radius:3px;overflow:hidden;margin:6px 0;}
    .progress-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--forest),var(--amber));transition:width .7s ease;}
    .progress-stats{display:flex;gap:14px;}
    .progress-stat{font-size:11px;color:var(--muted);}

    /* ── PRAYERS WALL ── */
    .prayer-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
    .prayer-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .prayer-card-text{font-size:14px;color:#3A3530;line-height:1.75;margin-bottom:14px;}
    .prayer-card-footer{display:flex;align-items:center;gap:10px;border-top:1px solid var(--border);padding-top:12px;}
    .prayed-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .prayed-chip{font-size:13px;background:var(--moss);border-radius:20px;padding:3px 10px;border:1px solid rgba(44,74,62,.15);}

    /* ── MISSIONS ── */
    .mission-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;transition:border-color .3s;}
    .mission-card.done{border-color:rgba(44,74,62,.35);background:var(--moss);}
    .mission-num{width:34px;height:34px;border-radius:50%;background:var(--parch);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--muted);flex-shrink:0;transition:all .3s;}
    .mission-num.done{background:var(--forest);color:#fff;}
    .mission-text{font-size:15px;color:var(--ink);line-height:1.55;transition:all .3s;}
    .mission-text.done{color:var(--muted);text-decoration:line-through;}
    .completed-by{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px;}

    /* ── QUOTA BANNER ── */
    .quota-banner{margin:16px;padding:14px 16px;background:var(--amber-lt);border:1px solid rgba(201,125,58,.3);border-radius:14px;}
    .quota-banner p:first-child{font-weight:700;color:var(--amber);font-size:14px;margin-bottom:4px;}
    .quota-banner p:last-child{font-size:12px;color:var(--muted);line-height:1.5;}

    /* ── CELEBRATION ── */
    .celebration-overlay{
      position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;
      background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;
      animation:fadeIn .3s ease;
    }
    .celebration-card{
      background:var(--white);border-radius:28px;padding:36px 28px;text-align:center;
      max-width:320px;width:90%;position:relative;overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
    }
    .confetti-piece{
      position:absolute;width:8px;height:8px;border-radius:2px;
      animation:confettiFall linear forwards;
    }
    @keyframes confettiFall{
      0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
      100%{transform:translateY(400px) rotate(720deg);opacity:0;}
    }

    /* ── LOADING ── */
    .loading-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;}
    .loading-icon{font-size:44px;margin-bottom:18px;}
    .loading-text{font-family:'Playfair Display',serif;color:var(--muted);font-style:italic;font-size:16px;}
    .loading-sub{color:var(--muted);font-size:12px;margin-top:8px;opacity:.7;}

    /* ── MOBILE FIXES ── */
    @media (max-width: 480px) {
      .login-title{font-size:26px;}
      .login-dove{font-size:56px;}
      .home-greeting{font-size:20px;}
      .dev-title{font-size:20px;}
      .dev-para{font-size:16px;line-height:1.85;}
      .verse-text{font-size:15px;}
      .prayer-para{font-size:15px;}
      .card-verse{padding:20px;}
      .home-header{padding:14px 16px 12px;}
      .home-tabs{padding:12px 16px 0;}
      .scroll > div, .scroll > .fi{padding:16px!important;}
      .topbar{padding:12px 16px;}
      .member-btn{max-width:100%;}
    }
    /* Prevent iOS zoom on inputs */
    input, textarea, select {font-size:16px!important;}
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

// ── CONSTANTS ──────────────────────────────────────────────────────────────
const TODAY=new Date().toISOString().split('T')[0];
const WEEK_KEY=(()=>{
  const d=new Date();
  // Semana devocional começa na quarta (3). Calcula a quarta mais recente.
  const daysSinceWed=(d.getDay()-3+7)%7;
  const wed=new Date(d);
  wed.setDate(d.getDate()-daysSinceWed);
  return wed.toISOString().split('T')[0]; // ex: "2026-04-15"
})();
const EMOJIS=['🌿','🌸','✨','🕊️','🌻','🌙','⭐','🦋','🌺','🍀','🦚','🌾'];
const COLORS=['#2C4A3E','#C4956A','#7B8EC8','#C87B8E','#8E7BC4','#7BC4B5'];

// ── SUPABASE ─────────────────────────────────────────────────────────────────
const SB_URL='https://mlznzzskyqagriojsxmw.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sem56enNreXFhZ3Jpb2pzeG13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODcwMDQsImV4cCI6MjA5MDU2MzAwNH0.0Ah-fsxfn_SjAj-KRWoYOJ75NODwoJHc1-VPBSZ7u60';
const sb=supabase.createClient(SB_URL,SB_KEY);

// ── STORAGE LOCAL ────────────────────────────────────────────────────────────
const S={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  rm(k){try{localStorage.removeItem(k);}catch{}},
};

// ── SUPABASE HELPERS ─────────────────────────────────────────────────────────
const DB={
  async getProgress(){
    const{data}=await sb.from('progresso').select('*');
    const p={};
    (data||[]).forEach(r=>{
      if(!p[r.membro_id])p[r.membro_id]={devotionals:[],missions:[]};
      if(r.tipo==='devocional')p[r.membro_id].devotionals.push(r.referencia);
      if(r.tipo==='missao')p[r.membro_id].missions.push(r.referencia);
    });
    return p;
  },
  async addProgress(membroId,tipo,referencia){
    const{data}=await sb.from('progresso').select('id').eq('membro_id',membroId).eq('tipo',tipo).eq('referencia',referencia);
    if(data&&data.length>0)return;
    await sb.from('progresso').insert({membro_id:membroId,tipo,referencia});
  },
  async getOracoes(){
    const weekStart=new Date();const daysSinceWed=(weekStart.getDay()-3+7)%7;weekStart.setDate(weekStart.getDate()-daysSinceWed);weekStart.setHours(0,0,0,0);
    const{data}=await sb.from('oracoes').select('*, intercessions(membro_id)').gte('criado_em',weekStart.toISOString()).order('criado_em',{ascending:false});
    return(data||[]).map(o=>({
      id:o.id, authorId:o.autor_id, text:o.texto, date:o.data_br,
      prayedBy:(o.intercessions||[]).map(i=>i.membro_id)
    }));
  },
  async addOracao(autor,texto){
    const{data}=await sb.from('oracoes').insert({
      autor_id:autor.id, autor_nome:autor.name, autor_emoji:autor.emoji,
      texto, data_br:new Date().toLocaleDateString('pt-BR')
    }).select().single();
    return data;
  },
  async addIntercessao(oracaoId,membroId){
    await sb.from('intercessions').upsert({oracao_id:oracaoId,membro_id:membroId});
  },
  async getComentarios(dataDevocional){
    const{data}=await sb.from('comentarios').select('*').eq('data_devocional',dataDevocional).order('criado_em');
    return(data||[]).map(c=>({id:c.id,authorId:c.autor_id,text:c.texto,time:c.hora}));
  },
  async addComentario(autorId,texto){
    await sb.from('comentarios').insert({
      autor_id:autorId, data_devocional:TODAY, texto,
      hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
    });
  },
  async getMembros(){
    const{data}=await sb.from('membros').select('*').order('id');
    return(data||[]).map(m=>({id:m.id,name:m.nome,emoji:m.emoji,color:m.cor}));
  },
  async saveMembros(list){
    for(const m of list){
      await sb.from('membros').upsert({id:m.id,nome:m.name,emoji:m.emoji,cor:m.color,atualizado_em:new Date().toISOString()});
    }
  },
  async getMissoes(){
    const{data}=await sb.from('progresso').select('*').eq('tipo','missao');
    const ms={};
    (data||[]).forEach(r=>{
      if(!ms[r.referencia])ms[r.referencia]=[];
      if(!ms[r.referencia].includes(r.membro_id))ms[r.referencia].push(r.membro_id);
    });
    return ms;
  },
};

// ── DEVOTIONAL LOADER ───────────────────────────────────────────────────────
let _devData=null;
async function loadDevData(){
  if(_devData)return _devData;
  const r=await fetch('devocionais.json?v='+Date.now());
  if(!r.ok)throw new Error('Arquivo devocionais.json não encontrado ('+r.status+')');
  _devData=await r.json();
  return _devData;
}
function getDayIndex(){
  // Semana começa na quarta (3) e termina na terça (2)
  // Quarta=0, Quinta=1, Sexta=2, Sábado=3, Domingo=4, Segunda=5, Terça=6
  return(new Date().getDay()-3+7)%7;
}
async function getTodayDevotional(){
  const data=await loadDevData();
  const allDays=data.semanas.flatMap(s=>s.dias.map(d=>({...d,tema:s.tema})));
  if(!allDays.length)throw new Error('Nenhum devocional encontrado no arquivo');
  const idx=getDayIndex()%allDays.length;
  const day=allDays[idx];
  // Último dia = terça-feira (getDay()===2)
  return {...day,isLastDay:new Date().getDay()===2};
}

function BoardScreen({members,progress}){
  const TOTAL=10;
  const PATH=[{x:12,y:83},{x:27,y:68},{x:47,y:77},{x:65,y:63},{x:80,y:72},{x:86,y:53},{x:72,y:39},{x:54,y:32},{x:36,y:46},{x:18,y:36},{x:9,y:18}];
  const PHASE_COLORS=['#2C4A3E','#C9A600','#7B5EA7','#C0504D','#2E86AB'];
  const PHASE_NAMES=['Fase 1','Fase 2','Fase 3','Fase 4','Fase 5'];
  const PHASE_LABELS=['🌱','👑','💜','🔥','✨'];
  const gp=id=>{
    const p=progress[id]||{};
    const d=(p.devotionals||[]).length;
    const ms=(p.missions||[]).length;
    const totalAll=d+ms;
    const phase=Math.floor(totalAll/TOTAL);
    const pts=totalAll%TOTAL;
    return{d,ms,total:pts,totalAll,phase};
  };
  const sorted=[...members].sort((a,b)=>gp(b.id).total-gp(a.id).total);
  return(
    <div className="screen">
      <div className="topbar"><h2>🗺️ Jornada da Família</h2></div>
      <div className="scroll" style={{padding:'16px'}}>
        <div className="map-container">
          <span className="map-decoration" style={{top:'8px',left:'16px',fontSize:'22px'}}>🌿</span>
          <span className="map-decoration" style={{top:'38%',right:'12px',fontSize:'18px'}}>🌸</span>
          <span className="map-decoration" style={{bottom:'18px',left:'38%',fontSize:'14px'}}>✦</span>
          <svg style={{position:'absolute',top:0,left:0,width:'100%',height:'100%'}} viewBox="0 0 100 100" preserveAspectRatio="none">
            <polyline points={PATH.map(p=>`${p.x},${p.y}`).join(' ')} fill="none" stroke="rgba(44,74,62,.2)" strokeWidth="1.8" strokeDasharray="3,3"/>
          </svg>
          {PATH.map((p,i)=>(
            <div key={i} className={`path-dot ${i===PATH.length-1?'path-dot-goal':'path-dot-normal'}`} style={{left:`${p.x}%`,top:`${p.y}%`}}>
              {i===PATH.length-1?'⭐':''}
            </div>
          ))}
          {members.map((m,mi)=>{
            const{total,phase}=gp(m.id);const pos=PATH[total]||PATH[0];
            return(
              <div key={m.id} className="member-token" style={{left:`${pos.x}%`,top:`${pos.y}%`,transform:`translate(${mi%2===0?'-130%':'20%'},-50%)`}}>
                <div style={{position:'relative'}}>
                  <div className="token-circle" style={{border:`2.5px solid ${m.color}`}}>{m.emoji}</div>
                  {phase>0&&<div style={{position:'absolute',top:'-6px',right:'-8px',background:PHASE_COLORS[Math.min(phase,4)],color:'white',fontSize:'7px',fontWeight:'900',borderRadius:'6px',padding:'1px 4px',lineHeight:'12px'}}>F{phase+1}</div>}
                </div>
                <div className="token-name">{m.name}</div>
              </div>
            );
          })}
          <div style={{position:'absolute',bottom:'8px',right:'10px',fontSize:'9px',color:'var(--muted)',fontWeight:'700'}}>Meta: ⭐ {TOTAL} pts</div>
        </div>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'17px',fontWeight:'700',color:'var(--ink)',marginBottom:'14px'}}>Placar</h3>
        {sorted.map((m,i)=>{const p=gp(m.id);const phaseColor=PHASE_COLORS[Math.min(p.phase,4)];const phaseLabel=PHASE_LABELS[Math.min(p.phase,4)];return(
          <div key={m.id} className="rank-row" style={{borderLeft:`3px solid ${phaseColor}`}}>
            <div className="rank-medal">{['🥇','🥈','🥉'][i]||<span style={{fontSize:'11px',fontWeight:'700',color:'var(--muted)'}}>{i+1}</span>}</div>
            <div className="avatar" style={{background:`${m.color}18`,border:`2px solid ${m.color}44`}}>{m.emoji}</div>
            <div style={{flex:1}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:'700',color:'var(--ink)',fontSize:'14px'}}>{m.name}</span>
                <span style={{fontSize:'14px',color:phaseColor,fontWeight:'800'}}>{phaseLabel} {PHASE_NAMES[Math.min(p.phase,4)]} · {p.total} pts</span>
              </div>
              <div className="progress-bar-wrap">
                <div className="progress-bar-fill" style={{width:`${(p.total/TOTAL)*100}%`,background:`linear-gradient(90deg,${phaseColor},${phaseColor}99)`}}/>
              </div>
              <div className="progress-stats">
                <span className="progress-stat">📖 {p.d} devocionais</span>
                <span className="progress-stat">⚔️ {p.ms} missões</span>
                <span className="progress-stat">🏆 {p.totalAll} total</span>
              </div>
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

                  </div>
                )}
                {!isDone&&<button className="btn btn-amber btn-sm" style={{marginTop:'10px'}} onClick={(e)=>{e.currentTarget.disabled=true;e.currentTarget.textContent='⏳...';onComplete(ms.id);}}>✅ Completar missão</button>}
              </div>
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

function CelebrationScreen({member,phase,onClose}){
  const PHASE_COLORS=['#2C4A3E','#C9A600','#7B5EA7','#C0504D','#2E86AB'];
  const PHASE_NAMES=['Fase 1','Fase 2','Fase 3','Fase 4','Fase 5'];
  const PHASE_LABELS=['🌱','👑','💜','🔥','✨'];
  const color=PHASE_COLORS[Math.min(phase,4)];
  const label=PHASE_LABELS[Math.min(phase,4)];
  const name=PHASE_NAMES[Math.min(phase,4)];
  const confetti=[...Array(20)].map((_,i)=>({
    left:`${Math.random()*100}%`,
    delay:`${Math.random()*1.5}s`,
    duration:`${1.5+Math.random()}s`,
    color:['#FFD700','#FF6B6B','#4ECDC4','#A8E6CF','#FFE66D','#C9A600'][i%6],
    size:`${6+Math.random()*8}px`
  }));
  return(
    <div className="celebration-overlay" onClick={onClose}>
      <div className="celebration-card" onClick={e=>e.stopPropagation()}>
        {confetti.map((c,i)=>(
          <div key={i} className="confetti-piece" style={{left:c.left,top:'-10px',width:c.size,height:c.size,background:c.color,animationDelay:c.delay,animationDuration:c.duration}}/>
        ))}
        <div style={{fontSize:'64px',marginBottom:'12px'}}>{label}</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:'22px',fontWeight:'700',color:'var(--ink)',marginBottom:'8px'}}>
          {member.emoji} {member.name}
        </h2>
        <p style={{color:'var(--muted)',fontSize:'14px',marginBottom:'20px',lineHeight:'1.6'}}>
          completou a Fase {phase}!<br/>Nova jornada começa agora.
        </p>
        <div style={{background:`${color}18`,border:`2px solid ${color}44`,borderRadius:'16px',padding:'16px',marginBottom:'24px'}}>
          <p style={{fontSize:'12px',color:'var(--muted)',fontWeight:'700',letterSpacing:'.8px',textTransform:'uppercase',marginBottom:'4px'}}>Próxima fase</p>
          <p style={{fontSize:'20px',fontWeight:'900',color:color}}>{label} {name}</p>
        </div>
        <button className="btn btn-primary btn-full" onClick={onClose} style={{padding:'14px',fontSize:'15px'}}>
          🚀 Continuar a jornada!
        </button>
      </div>
    </div>
  );
}

function BottomNav({active,onChange}){
  const tabs=[{id:'home',icon:'📖',label:'Hoje'},{id:'board',icon:'🗺️',label:'Jornada'},{id:'prayers',icon:'🙏',label:'Orações'},{id:'missions',icon:'⚔️',label:'Missões'}];
  return(
    <nav className="bottom-nav">
      {tabs.map(t=>(
        <button key={t.id} className={`nav-btn${active===t.id?' active':''}`} onClick={()=>onChange(t.id)}>
          <span>{t.icon}</span>
          <span>{t.label}</span>
          {active===t.id&&<div className="nav-indicator"/>}
        </button>
      ))}
    </nav>
  );
}

// ── ROOT APP ─────────────────────────────────────────────────────────────────
function App(){
  const[view,setView]=useState('loading');
  const[tab,setTab]=useState('home');
  const[user,setUser]=useState(null);
  const[members,setMembers]=useState([]);
  const[theme,setTheme]=useState(null);
  const[dev,setDev]=useState(null);
  const[prayer,setPrayer]=useState(null);
  const[comments,setComments]=useState([]);
  const[wall,setWall]=useState([]);
  const[missions,setMissions]=useState([]);
  const[progress,setProgress]=useState({});
  const[loading,setLoading]=useState(false);
  const[celebration,setCelebration]=useState(null);
  const[loadErr,setLoadErr]=useState('');

  const DEF=[
    {id:'1',name:'Bela',emoji:'🌿',color:'#2C4A3E'},
    {id:'2',name:'Membro 2',emoji:'🌸',color:'#C4956A'},
    {id:'3',name:'Membro 3',emoji:'✨',color:'#7B8EC8'},
  ];

  useEffect(()=>{(async()=>{
    let m=null;
    try{ m=await DB.getMembros(); }catch(e){ console.error('Erro membros:',e); }
    if(m&&m.length>0){setMembers(m);S.set('members',m);}
    else{
      const local=S.get('members');
      if(local)setMembers(local);else{setMembers(DEF);S.set('members',DEF);}
    }
    const th=S.get(`theme-${WEEK_KEY}`);
    const d=S.get(`dev-${TODAY}`);
    const pr=S.get(`prayer-${TODAY}`);
    // Se o tema mudou esta semana, limpa o cache do devocional do dia
    if(d&&th&&d.tema&&d.tema!==th.theme){S.rm(`dev-${TODAY}`);}
    if(th)setTheme(th);
    if(d&&th&&d.tema===th.theme)setDev(d);
    if(pr)setPrayer(pr);
    const[pg,wl,cm]=await Promise.all([DB.getProgress(),DB.getOracoes(),DB.getComentarios(TODAY)]);
    setProgress(pg);
    setWall(wl);
    setComments(cm);
    setView('login');
  })();},[]);

  async function generate(){
    setLoading(true);
    try{
      const today=await getTodayDevotional();
      const th={theme:today.tema};
      setTheme(th);S.set(`theme-${WEEK_KEY}`,th);
      const d={title:today.titulo,verse:today.versiculo,verseText:today.versiculoTexto,reflection:today.reflexao,prayer:today.oracao,isLastDay:today.isLastDay,tema:today.tema};
      setDev(d);S.set(`dev-${TODAY}`,d);
      setPrayer({text:today.oracao});S.set(`prayer-${TODAY}`,{text:today.oracao});
      // ── CORREÇÃO: IDs de missão incluem a semana para evitar conflito entre semanas ──
      const msDone=await DB.getMissoes();
      const ms=(today.missoes||[]).map((t,i)=>({id:`${WEEK_KEY}-${i+1}`,text:t,completedBy:msDone[`${WEEK_KEY}-${i+1}`]||[]}));
      setMissions(ms);
    }catch(e){console.error(e);alert('Erro ao carregar: '+e.message);}
    setLoading(false);
  }

  async function handleLogin(m){
    setUser(m);setView('app');setTab('home');
    if(!S.get(`dev-${TODAY}`)) await generate();
    else{
      const msDone=await DB.getMissoes();
      try{
        const today=await getTodayDevotional();
        // ── CORREÇÃO: IDs de missão incluem a semana para evitar conflito entre semanas ──
        const ms=(today.missoes||[]).map((t,i)=>({id:`${WEEK_KEY}-${i+1}`,text:t,completedBy:msDone[`${WEEK_KEY}-${i+1}`]||[]}));
        setMissions(ms);
      }catch(e){
        const cached=S.get(`missions-${WEEK_KEY}`)||[];
        setMissions(cached.map(ms=>({...ms,completedBy:msDone[ms.id]||[]})));
      }
      const[pg,wl,cm]=await Promise.all([DB.getProgress(),DB.getOracoes(),DB.getComentarios(TODAY)]);
      setProgress(pg);setWall(wl);setComments(cm);
    }
  }

  async function markRead(){
    await DB.addProgress(user.id,'devocional',`${WEEK_KEY}-${TODAY}`);
    const pg=await DB.getProgress();
    setProgress(pg);
    checkPhase(pg,user.id);
  }

  async function addComment(text){
    await DB.addComentario(user.id,text);
    const cm=await DB.getComentarios(TODAY);
    setComments(cm);
  }

  async function addPrayer(text){
    await DB.addOracao(user,text);
    const wl=await DB.getOracoes();
    setWall(wl);
  }

  async function prayFor(id){
    await DB.addIntercessao(id,user.id);
    const wl=await DB.getOracoes();
    setWall(wl);
  }

  function checkPhase(pg,uid){
    const p=pg[uid]||{};
    const total=(p.devotionals||[]).length+(p.missions||[]).length;
    const TOTAL=10;
    if(total>0&&total%TOTAL===0){
      const phase=total/TOTAL;
      setCelebration({member:user,phase});
    }
  }

  async function completeMission(mid){
    setMissions(ms=>ms.map(m=>m.id===mid&&!m.completedBy.includes(user.id)?{...m,completedBy:[...m.completedBy,user.id]}:m));
    await DB.addProgress(user.id,'missao',mid);
    const[pg,msDone]=await Promise.all([DB.getProgress(),DB.getMissoes()]);
    setProgress(pg);
    setMissions(ms=>ms.map(m=>({...m,completedBy:msDone[m.id]||[]})));
    checkPhase(pg,user.id);
  }

  async function saveMembers(list){
    setMembers(list);S.set('members',list);
    try{ await DB.saveMembros(list); }catch(e){ console.error('Erro ao salvar membros:',e); }
    setView('login');
  }

  const hasRead=!!(progress[user?.id]?.devotionals||[]).includes(`${WEEK_KEY}-${TODAY}`);

  if(view==='loading')return<div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--cream)'}}><div style={{fontSize:'40px'}} className="pulse">🕊️</div></div>;
  if(view==='setup')return<SetupScreen members={members} onSave={saveMembers} onBack={()=>setView('login')}/>;
  if(view==='login')return<LoginScreen members={members} onLogin={handleLogin} onSetup={()=>setView('setup')}/>;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'var(--cream)'}}>
      {celebration&&<CelebrationScreen member={celebration.member} phase={celebration.phase} onClose={()=>setCelebration(null)}/>}
      {tab==='home'&&<HomeScreen user={user} theme={theme} dev={dev} prayer={prayer} comments={comments} loading={loading} onMarkRead={markRead} onAddComment={addComment} onRegenerate={generate} hasRead={hasRead} members={members}/>}
      {tab==='board'&&<BoardScreen members={members} progress={progress}/>}
      {tab==='prayers'&&<PrayersScreen user={user} wall={wall} onAdd={addPrayer} onPray={prayFor} members={members}/>}
      {tab==='missions'&&<MissionsScreen user={user} missions={missions} theme={theme} onComplete={completeMission} members={members}/>}
      <BottomNav active={tab} onChange={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
